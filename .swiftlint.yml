included:
  - extension/edr

excluded:
  - extension/edr/build

opt_in_rules:
  - closure_body_length
  - discouraged_optional_boolean
  - empty_count
  - explicit_init
  - fatal_error_message
  - force_cast
  - force_try
  - force_unwrapping
  - implicitly_unwrapped_optional
  - no_magic_numbers # flags numeric literals not assigned to a named constant
  - overridden_super_call
  - private_action
  - private_outlet
  - strong_iboutlet
  - toggle_bool
  - unavailable_function
  - unowned_variable_capture
  - vertical_whitespace_closing_braces

# SwiftLint's no_magic_numbers defaults: 0 and 1 are allowed, plus any
# literal at the top of an XCTestCase subclass file. We don't add an
# explicit allow-list here because Swift's strong typing and named
# parameters mean a literal usually only shows up when it really is a
# tunable; expanding the allow-list eagerly defeats the rule.
no_magic_numbers:
  test_parent_classes:
    - XCTestCase

analyzer_rules:
  - unused_import

disabled_rules: []

identifier_name:
  min_length: 1

line_length:
  warning: 150
  error: 200

file_length:
  warning: 500
  error: 1000

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 60
  error: 100
