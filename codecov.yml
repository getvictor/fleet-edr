# Codecov config. Targets and ignore patterns mirror sonar-project.properties so
# the two services agree on what's measured. If you change one, change both.

coverage:
  precision: 1
  round: nearest
  range: "65...90"

  status:
    project:
      default:
        # Tracks reality on main (today ~73.1% per codecov). Sonar's per-PR new-code gate at
        # 80% (configured in the SonarCloud UI) is the authoritative bar for what each change
        # must meet; this project rollup just tracks the trend. Lowered from 80% to 75% per
        # issue #124, then to 70% after main drifted below the 75% floor and the gate began
        # failing on every PR regardless of patch coverage.
        target: 70%
        # Allow a 1% drift before failing the project status; smaller deltas are
        # noise from coverage tool reordering, not regressions.
        threshold: 1%
        if_ci_failed: error
        only_pulls: false
    patch:
      default:
        # Sonar's per-PR "Coverage on New Code" gate is 80%, but codecov's patch coverage tends to be stricter in practice (the
        # uploaded LCOV is per-language and per-flag, and codecov's branch-counting differs from sonar's). Held at 70% so codecov
        # doesn't gate-out PRs that sonar already accepts; sonar remains the authoritative new-code bar.
        target: 70%
        threshold: 0%
        if_ci_failed: error

# Per-component flags so the Codecov dashboard distinguishes Go (agent),
# Go (server), and TS (ui). Each flag is uploaded by its own action call;
# see .github/workflows/test.yml.
flag_management:
  default_rules:
    carryforward: true
    statuses:
      - type: project
        # Per-flag project target. Held at a fixed 70% rather than `auto` so the gate stops failing on small trend drifts (a flag
        # going from 78% to 76% would otherwise breach the prior auto+1%-threshold setup). The patch gate below keeps regressions
        # on new code visible; sonar's per-PR 80% new-code gate remains the authoritative bar.
        target: 70%
      - type: patch
        # Per-flag patch target. Mirrors the project-wide patch target above; see the note there for why codecov is held one notch
        # below sonar's 80% new-code gate.
        target: 70%
  individual_flags:
    - name: agent
      paths:
        - agent/
    - name: server
      paths:
        - server/
    # The `ui` flag covers ui/src/**. Vitest doesn't ship UI tests
    # today, but the Playwright E2E run captures V8 coverage of the
    # running React bundle and emits an LCOV via monocart-coverage-
    # reports. The same flag accumulates that LCOV; when vitest tests
    # land they upload to the same flag and Codecov takes the union.
    - name: ui
      paths:
        - ui/src/

comment:
  layout: "header, diff, flags, components, files"
  behavior: default
  require_changes: false

# Mirror sonar.coverage.exclusions so the two services agree. Generated code,
# main entrypoints, test harnesses, the Swift extensions (no Go coverage),
# the JSON-Schema sources, and the test/ directory all stay off the
# coverage surface. ui/src/** is NO LONGER in the ignore list — the
# Playwright E2E run captures UI coverage via V8 + source maps, so we
# want those lines to count. Keep sonar-project.properties'
# sonar.coverage.exclusions in sync.
ignore:
  - "**/cmd/**/main.go"
  - "ui/vite.config.ts"
  - "server/detection/testharness/**"
  - "schema/**"
  - "extension/edr/**"
  - "agent/receiver/**"
  - "agent/logging/**"
  - "server/bootstrap/**"
  - "server/httpserver/**"
  - "test/**"
  - "tools/**"
