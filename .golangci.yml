version: "2"

formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  default: none
  enable:
    - bodyclose
    - canonicalheader # enforce canonical HTTP header names (e.g. X-Request-ID not x-request-id)
    - contextcheck # catches context.Context not propagated through function call chains
    - copyloopvar
    - depguard
    - durationcheck # catches time.Duration * time.Duration (common bug that compiles fine but is meaningless)
    - errcheck
    - errorlint
    - exhaustive
    - exptostd
    - forbidigo
    - gocheckcompilerdirectives # validates //go:build syntax; a typo silently disables the build tag
    - gocritic # diagnostic + style checks; adds several readability rules missing from staticcheck
    - gosec
    - govet
    - ineffassign
    - intrange
    - makezero
    - misspell # catches typos in comments + string literals; very cheap
    - mnd # flags unnamed numeric literals (magic numbers) outside the ignored-numbers list
    - modernize
    - musttag
    - nilnesserr
    - noctx
    - perfsprint # catches fmt.Sprintf where strconv / string concat would suffice
    - predeclared # warns when a local name shadows a Go predeclared identifier (cap, len, new, ...)
    - revive
    - rowserrcheck # ensures rows.Err() is checked after rows.Next() in database/sql queries
    - sqlclosecheck
    - staticcheck
    - testifylint
    - thelper # test helpers must call t.Helper() so failures point at the caller
    - tparallel # tests that spawn subtests must opt in to parallelism consistently
    - unconvert
    - unused
    - usetesting
    - wastedassign # catches x := foo(); x = bar() (the first value is wasted)
    - whitespace # catches extraneous leading/trailing blank lines in blocks

  settings:
    forbidigo:
      forbid:
        - pattern: "^print$"
          msg: "use structured logging instead of built-in print"
        - pattern: "^println$"
          msg: "use structured logging instead of built-in println"
        - pattern: "^slog\\.(Debug|Info|Warn|Error)"
          pkg: "^log/slog$"
          msg: "Don't use the default logger. Use a specific *slog.Logger instance."
        - pattern: "slog\\.Logger\\.(Debug|Info|Warn|Error)$"
          msg: "use DebugContext/InfoContext/WarnContext/ErrorContext instead"
      analyze-types: true

    depguard:
      rules:
        main:
          deny:
            - pkg: github.com/pkg/errors
              desc: "use stdlib errors.New / fmt.Errorf with the %w verb"
        # Agent packages must not depend on server packages. The two were
        # separate Go modules until the 2026-04 single-module refactor; the
        # enforcement now lives here instead of at the module boundary. If
        # genuinely shared code is needed, put it in internal/ and import
        # from there.
        agent-boundary:
          files:
            - "**/agent/**/*.go"
          deny:
            - pkg: github.com/fleetdm/edr/server
              desc: "agent packages must not import server packages (move shared code to internal/)"
        # Symmetric: server packages must not depend on agent packages.
        server-boundary:
          files:
            - "**/server/**/*.go"
          deny:
            - pkg: github.com/fleetdm/edr/agent
              desc: "server packages must not import agent packages (move shared code to internal/)"

    govet:
      enable:
        - nilness

    errcheck:
      check-type-assertions: false
      check-blank: false
      disable-default-exclusions: false
      exclude-functions:
        # fmt package
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Print
        - fmt.Printf
        - fmt.Println
        # Close methods
        - "(io.Closer).Close"
        - "(io.ReadCloser).Close"
        - "(io.WriteCloser).Close"
        - "(*os.File).Close"
        - "(*database/sql.Rows).Close"
        - "(*database/sql.DB).Close"
        - "(*database/sql.Stmt).Close"
        - "(*database/sql.Tx).Rollback"
        - "(*github.com/jmoiron/sqlx.DB).Close"
        # OS operations
        - os.Remove
        - os.RemoveAll
        - os.Setenv
        - os.Unsetenv

    gosec:
      excludes:
        - G104 # Covered by errcheck linter
      config:
        G306: "0644"

    mnd:
      # All six default checks are enabled. `argument` is the noisiest but
      # also the most valuable: the unnamed `30` in `time.NewTicker(30)` is
      # exactly the kind of thing this linter is meant to surface.
      checks:
        - argument
        - case
        - condition
        - operation
        - return
        - assign
      # Common, semantically obvious values. 8/16/32/64 cover bit-sizes for
      # strconv/binary, 1024 covers KiB-style scaling. Keep the list short:
      # ignored-numbers is a sledgehammer that hides every occurrence of a
      # literal everywhere, including the cases where it really is magic.
      ignored-numbers:
        - "0"
        - "1"
        - "2"
        - "3"
        - "8"
        - "10"
        - "16"
        - "32"
        - "64"
        - "100"
        - "1000"
        - "1024"
      # Calls where a numeric literal is part of the API contract, not a
      # magic constant: base / bit-size for strconv, file modes for os.*,
      # capacity hints for make(). time.* is intentionally NOT here so
      # `5 * time.Second` style code surfaces the 5 as a tunable.
      ignored-functions:
        - "^make$"
        - "^strconv\\.(Format|Parse|Append)(Int|Uint|Float)$"
        - "^os\\.(WriteFile|Mkdir|MkdirAll|Chmod|OpenFile)$"
        - "^math\\.(Pow|Log|Round)$"

    staticcheck:
      checks:
        - "all"
        - "-SA9003" # Empty body in an if or else branch
        - "-ST1000" # Incorrect or missing package comment

    revive:
      severity: "warning"
      confidence: 0.8
      rules:
        - name: dot-imports
        - name: error-return
        - name: var-declaration
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id

  exclusions:
    generated: strict
    # paths excludes whole directories from analysis. tmp/ holds local
    # scratch programs (queue-stuffers, manual db pokers) that are
    # already in .gitignore but still on disk; ui/node_modules/ contains
    # vendored JS-tooling-side Go sources (e.g. flatted's Go reference
    # implementation) that we neither ship nor maintain. Linting either
    # path produces noise across every PR with no actionable signal.
    paths:
      - tmp
      - ui/node_modules
    rules:
      # test/loadtest.go generates synthetic event payloads for throughput
      # benchmarks; crypto/rand-grade randomness is wrong here (slower and
      # semantically meaningless for test fixture data). gosec G404 flags
      # math/rand and math/rand/v2 equally, so the exclusion is per-file.
      - path: test/loadtest\.go
        linters:
          - gosec
        text: "G404"
      # Magic numbers in tests are rarely magic: ports, table sizes,
      # expected counts, fake timestamps. Forcing every `123` in a fixture
      # to be a named constant adds noise without catching real bugs.
      - path: _test\.go
        linters:
          - mnd
      - path: test/(loadtest|integration/setup)\.go
        linters:
          - mnd
