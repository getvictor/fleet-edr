# HAProxy load balancer for the multi-replica EDR server stack: the alternative
# to packaging/nginx/multi-replica.conf. Its advantage over open-source NGINX is
# ACTIVE health checks: it polls each replica's /readyz and pulls a draining or
# unhealthy replica from rotation BEFORE a real request would fail.
#
# To use it instead of NGINX, point the proxy service in
# docker-compose-multi-replica.yml at `image: haproxy:3.0` and mount this file
# at /usr/local/etc/haproxy/haproxy.cfg:ro (replacing the nginx config mount).
#
# Sessions are MySQL-backed, so this config has NO stick tables / cookie
# affinity: any replica serves any request (server-availability).

global
    log stdout format raw local0
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend edr_https
    # External TLS termination. Concatenate fullchain + privkey into
    # /tls/edr.pem for HAProxy's single-file cert format.
    bind :443 ssl crt /tls/edr.pem
    http-request set-header X-Forwarded-Proto https
    default_backend edr_replicas

backend edr_replicas
    balance roundrobin
    # Active health check: GET /readyz over TLS. A replica that reports 503
    # (draining on SIGTERM, or DB unreachable) is taken out of rotation until it
    # reports ready again. `check-ssl` because the backend hop is HTTPS (the EDR
    # binary serves HTTPS only); `verify none` since the backend cert is
    # commonly internal/self-signed and reused across replicas.
    option httpchk
    # ver HTTP/1.1 + an explicit Host header: Go's net/http rejects an HTTP/1.1 request with no Host as 400 Bad Request, which would
    # fail the check and mark every replica down. (HTTP/1.0 needs no Host, but newer HAProxy defaults http-check to 1.1.)
    http-check send meth GET uri /readyz ver HTTP/1.1 hdr host localhost
    http-check expect status 200
    default-server check check-ssl verify none inter 5s fall 3 rise 2
    server server-a server-a:8088 ssl
    server server-b server-b:8088 ssl
