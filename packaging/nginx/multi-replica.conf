# NGINX reverse proxy for the multi-replica EDR server stack.
# Used by packaging/docker-compose-multi-replica.yml. It terminates external
# TLS and load-balances across the stateless server replicas.
#
# Sessions are MySQL-backed (server-availability: "Sessions and CSRF tokens
# validate across any replica"), so there are NO sticky sessions here: any
# replica can serve any request. Removing a replica from rotation never strands
# a logged-in operator.
#
# Health checking: open-source NGINX has only PASSIVE checks (max_fails /
# fail_timeout below). It marks a replica down after repeated failed forwards
# and retries it after fail_timeout. Active /readyz polling (so a draining
# replica is pulled BEFORE a request fails) needs NGINX Plus, or use the
# HAProxy variant in packaging/haproxy/multi-replica.cfg, which does active
# `GET /readyz` checks on open-source HAProxy.

upstream edr_replicas {
    # Default round-robin; no `ip_hash`/`sticky` because sessions are not
    # replica-local. Add replicas by listing more `server` lines.
    server server-a:8088 max_fails=3 fail_timeout=10s;
    server server-b:8088 max_fails=3 fail_timeout=10s;
    keepalive 16;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # External TLS termination. Reuse the same cert the replicas present on the
    # backend hop, or a distinct public cert.
    ssl_certificate     /tls/fullchain.pem;
    ssl_certificate_key /tls/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Agents upload event batches; allow a generous body and read timeout.
    client_max_body_size 32m;

    location / {
        # The EDR binary serves HTTPS only (issue #140), so the proxy-to-backend
        # hop is also TLS. proxy_ssl_verify is off here because the backend cert
        # is commonly an internal/self-signed cert reused across replicas; turn
        # it on with proxy_ssl_trusted_certificate if you issue a backend CA.
        proxy_pass https://edr_replicas;
        proxy_ssl_server_name on;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # On a draining/late replica, transparently retry the next one. Combined
        # with the drain window the server holds open after SIGTERM, a rolling
        # upgrade is hitless.
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_read_timeout 30s;
    }
}
