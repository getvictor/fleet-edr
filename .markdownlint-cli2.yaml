# markdownlint-cli2 configuration.
#
# Layered on top of markdownlint's defaults. Disable rules that fight the
# repo's prose style; keep rules that catch real defects (untagged code
# fences, broken links, inconsistent heading levels).
#
# Run: `task lint:md`. CI gate lives in `.github/workflows/md-lint.yml`.

globs:
  - "**/*.md"

ignores:
  - "node_modules/**"
  - "ui/node_modules/**"
  - "test/e2e/node_modules/**"
  - "tools/**/node_modules/**"
  - "ai/**"                     # gitignored scratch
  - "tmp/**"                    # gitignored
  - "openspec/changes/**"       # generated by openspec tooling; format owned upstream
  - ".claude/**"                # AI tool config installed by openspec / claude-code; we do not edit these
  - "CLAUDE.md"                 # directive file for AI assistants; intentionally starts with ## not #
  - ".github/pull_request_template.md" # GitHub PR form, not prose; opens with an HTML comment by design (MD041)
  - "docs/detection-rules.md"   # auto-generated by tools/gen-rule-docs
  - "docs/maintenance/log.md"   # free-form journal with unstructured one-line entries

config:
  # Line length is OFF. The repo does NOT hard-wrap Markdown prose (CLAUDE.md
  # "Code style"); Prettier (.prettierrc.yaml, proseWrap: never) collapses each
  # paragraph and list item to a single line, which by design runs well past any
  # column limit. MD013 (a maximum-length rule) would flag every such line, so it
  # directly contradicts the no-wrap convention and is disabled. Prettier owns
  # wrapping; markdownlint owns structure.
  MD013: false

  # We use raw HTML for collapsible sections (<details>/<summary>) and the
  # occasional shields.io badge. Allowing inline HTML is the practical call.
  MD033: false

  # Bare URLs are common in operator runbooks where the URL IS the content
  # (e.g. dashboards, GitHub releases). Wrapping every one in <> is noise.
  MD034: false

  # Allow duplicate sibling headings under different parent headings
  # (e.g. multiple "Prerequisites" sections in different chapters).
  MD024:
    siblings_only: true

  # Table-column-style (added in markdownlint v0.38, default-on in newer
  # markdownlint-cli2 releases). Left OFF because Prettier (.prettierrc.yaml) now
  # owns table formatting: it pads every cell to align columns and rewrites
  # separator rows to `| --- |`. That is the enforced uniform style, applied by
  # `task lint:md:prose:fix` and gated by `task lint:md:prose`, so a second
  # markdownlint opinion on table columns is redundant and would only risk
  # disagreeing with Prettier.
  MD060: false

  # List-marker spacing. OFF because Prettier owns list formatting: when an
  # ordered-list item contains an indented code block, Prettier writes two spaces
  # after the marker (`3.  text`) to align the continuation, which MD030 flags
  # (it wants exactly one). Same call as MD060 - Prettier is the single source of
  # truth for list/table layout, so a competing markdownlint opinion only creates
  # an unwinnable disagreement.
  MD030: false

  # Default first-line-h1 stays on so every doc opens with a clear title.
  # MD041: enabled by default.

  # Default fenced-code-language stays on; this is the rule CodeRabbit
  # flagged and the main reason we are adopting markdownlint.
  # MD040: enabled by default.
