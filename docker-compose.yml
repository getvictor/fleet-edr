# Local dev MySQL. Ports 3316/3317 avoid conflicts with other local MySQL instances.
# Server and ingest CLI defaults match these ports.
services:
  mysql:
    image: mysql:8.4
    container_name: fleet-edr-mysql
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: edr
    ports:
      - "127.0.0.1:3316:3306"
    volumes:
      - edr-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  mysql_test:
    image: mysql:8.4
    container_name: fleet-edr-mysql_test
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: edr_test
    ports:
      - "127.0.0.1:3317:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  edr-mysql-data:
