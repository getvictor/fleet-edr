# app-control-block scenario.
#
# This scenario exercises Application Control ACTIVE BLOCKING across the full rule-type
# matrix: for each block rule type (BINARY, PATH, CDHASH always; CERTIFICATE, SIGNINGID,
# TEAMID when UAT_ACBLOCK_FIXTURE_BIN is set, see README), attack.sh posts a BLOCK rule via the admin API,
# confirms the system extension DENIES the matching exec on a SIP-on VM (host-side
# enforcement), and asserts the resulting application_control_block alert server-side.
#
# There is intentionally NO `rules:` block. The alert a block produces has a
# DYNAMIC rule_id (app_control:<ruleId>, assigned per run), which the driver's
# static rule_id match cannot express. attack.sh therefore asserts BOTH halves
# itself (the host-side AUTH_EXEC deny AND the application_control_block alert for
# the exact rule it created), and the driver passes the scenario on attack.sh's
# exit 0 -- a mode it explicitly supports ("scenario passes on attack.sh exit 0
# alone").

scenario_id: app-control-block
description: >-
  Walks the app-control block rule-type matrix (BINARY, PATH, CDHASH always; CERTIFICATE,
  SIGNINGID, TEAMID when UAT_ACBLOCK_FIXTURE_BIN points to a non-EDR Developer-ID-signed
  binary), confirming the extension denies each matching exec on a SIP-on VM and asserting
  the application_control_block alert per rule. Assertions live in attack.sh (the alert
  rule_ids are dynamic).
# within_seconds is the driver's alert-poll window, consumed only when expected.yaml has a `rules:` block. This scenario has
# none -- attack.sh asserts its own alerts with its own internal timeouts and the driver passes on exit 0 -- so the value is
# inert here. It is nonetheless sized to the script's real worst-case (~3x60s deny polls + 3x30s alert polls, roughly doubled
# once the fixture path runs) so it stays correct if a `rules:` block is ever added.
within_seconds: 900
