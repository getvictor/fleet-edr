# Ambient noise: a developer's workstation morning. Boot a terminal, list
# files, run a Go build. None of these touch the catalog rules' triggering
# shapes -- expected zero alerts. A FP here is a signal that one of the
# rules has gotten greedy (e.g. broadened its path / args matchers).
name: "noise: developer workstation -- terminal + ls + go build"
host:
  id: BBBB0001-0000-0000-0000-000000000001
  hostname: efficacy-noise-developer.local
  os: macOS 26.0
timeline:
  # Terminal launches.
  - at: 0ms
    type: fork
    child_pid: 8001
    parent_pid: 1
  - at: 10ms
    type: exec
    pid: 8001
    ppid: 1
    path: /System/Applications/Utilities/Terminal.app/Contents/MacOS/Terminal
    args: ["Terminal"]
    cwd: /Users/dev
    uid: 501
    gid: 20

  # Login shell (zsh) under Terminal.
  - at: 100ms
    type: fork
    child_pid: 8002
    parent_pid: 8001
  - at: 110ms
    type: exec
    pid: 8002
    ppid: 8001
    path: /bin/zsh
    args: ["-zsh"]
    cwd: /Users/dev
    uid: 501
    gid: 20

  # Developer runs `ls -la`.
  - at: 200ms
    type: fork
    child_pid: 8003
    parent_pid: 8002
  - at: 210ms
    type: exec
    pid: 8003
    ppid: 8002
    path: /bin/ls
    args: ["ls", "-la"]
    cwd: /Users/dev/projects/myapp
    uid: 501
    gid: 20

  # Developer runs `go build ./...`.
  - at: 300ms
    type: fork
    child_pid: 8004
    parent_pid: 8002
  - at: 310ms
    type: exec
    pid: 8004
    ppid: 8002
    path: /usr/local/go/bin/go
    args: ["go", "build", "./..."]
    cwd: /Users/dev/projects/myapp
    uid: 501
    gid: 20
