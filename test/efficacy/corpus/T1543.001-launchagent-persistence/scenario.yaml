# T1543.001 Create or Modify System Process: Launch Agent.
#
# Synthetic attacker invokes /bin/launchctl load against a plist path. The
# persistence_launchagent rule matches `path == /bin/launchctl` plus the
# `load` subcommand argument, fires a high severity alert. Mirrors the rule's
# positive shape with a single fork+exec pair: no upstream chain required.
name: "T1543.001 persistence via launchctl load <plist>"
host:
  id: AAAA1543-0001-0000-0000-000000000001
  hostname: efficacy-t1543-001.local
  os: macOS 26.0
timeline:
  - at: 0ms
    type: fork
    child_pid: 4543
    parent_pid: 1
  - at: 10ms
    type: exec
    pid: 4543
    ppid: 1
    path: /bin/launchctl
    args: ["launchctl", "load", "/Users/victor/Library/LaunchAgents/com.synth.persist.plist"]
    cwd: /Users/victor
    uid: 501
    gid: 20
