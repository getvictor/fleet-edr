# Expected detection assertions for the T1059-suspicious-exec technique scenario.
# rule_id: catalog rule ID that should fire (one row in /api/alerts when
# the L6 runner polls). severity: pinned so a rule downgrade is visible.
# within_seconds: per-rule SLA budget from POST to alert visibility.
scenario_id: T1059-suspicious-exec
mitre: T1059 + T1105
within_seconds: 30
rules:
  - rule_id: suspicious_exec
    severity: high
    expect: alert
