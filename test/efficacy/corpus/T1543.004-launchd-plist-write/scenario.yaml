# T1543.004 Create or Modify System Process: Launch Daemon.
#
# A system LaunchDaemon is registered via Background Task Management
# (ES_EVENT_TYPE_NOTIFY_BTM_LAUNCH_ITEM_ADD, item_type=daemon) whose registered
# executable (/tmp/raw_dropper) is unsigned/ad-hoc. The privilege_launchd_plist_write
# rule fires on the unmanaged daemon registration of a non-Apple, non-notarized,
# non-allowlisted executable (ADR-0008 + its 2026-05-29 amendment). Mirrors the
# positive_daemon_unsigned_executable fixture.
#
# Ground-truthed on edr-dev (ai/btm-attribution/experiment.md): the BTM instigator
# for a `launchctl bootstrap` is Apple's smd (a platform binary), so the decision
# rides the REGISTERED EXECUTABLE's code-signing, not the instigator. This scenario
# models that exactly: a platform-binary instigator (smd-like) plus an unsigned
# executable, which must still fire.
name: "T1543.004 LaunchDaemon registration of an unsigned executable"
host:
  id: AAAA1543-0004-0000-0000-000000000004
  hostname: efficacy-t1543-004.local
  os: macOS 26.0
timeline:
  - at: 0ms
    type: fork
    child_pid: 4544
    parent_pid: 1
  - at: 10ms
    type: exec
    pid: 4544
    ppid: 1
    path: /tmp/raw_dropper
    args: ["/tmp/raw_dropper"]
    cwd: /tmp
    uid: 0
    gid: 0
  - at: 20ms
    type: btm_launch_item_add
    item_type: daemon
    item_path: /Library/LaunchDaemons/com.synth.persistence.plist
    executable_path: /tmp/raw_dropper
    executable_code_signing_present: true
    executable_team_id: ""
    executable_is_platform_binary: false
    executable_is_notarized: false
    instigator_pid: 93
    instigator_team_id: ""
    instigator_is_platform_binary: true
