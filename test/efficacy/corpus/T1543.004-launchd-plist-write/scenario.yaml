# T1543.004 Create or Modify System Process: Launch Daemon.
#
# A non-platform-binary instigator (/tmp/raw_dropper) registers a system
# LaunchDaemon, surfaced via Background Task Management
# (ES_EVENT_TYPE_NOTIFY_BTM_LAUNCH_ITEM_ADD, item_type=daemon). The
# privilege_launchd_plist_write rule fires on the unmanaged daemon registration
# by a non-Apple, non-allowlisted instigator (ADR-0008). Mirrors the
# positive_daemon_unsigned_instigator fixture.
#
# NOTE (L5/VM to confirm): this scenario asserts the RULE CONTRACT — the BTM
# instigator is the non-platform dropper. The real BTM instigator for a legacy
# `launchctl bootstrap` may instead be launchctl/launchd (a platform binary);
# the edr-qa run must confirm the attribution and, if it differs, the rule's
# discriminator moves from the instigator to the daemon executable.
name: "T1543.004 LaunchDaemon registration by /tmp/raw_dropper"
host:
  id: AAAA1543-0004-0000-0000-000000000004
  hostname: efficacy-t1543-004.local
  os: macOS 26.0
timeline:
  - at: 0ms
    type: fork
    child_pid: 4544
    parent_pid: 1
  - at: 10ms
    type: exec
    pid: 4544
    ppid: 1
    path: /tmp/raw_dropper
    args: ["/tmp/raw_dropper"]
    cwd: /tmp
    uid: 0
    gid: 0
  - at: 20ms
    type: btm_launch_item_add
    item_type: daemon
    item_path: /Library/LaunchDaemons/com.synth.persistence.plist
    executable_path: /tmp/raw_dropper
    instigator_pid: 4544
    instigator_team_id: ""
    instigator_is_platform_binary: false
