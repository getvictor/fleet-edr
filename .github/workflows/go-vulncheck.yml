name: Go vulncheck

on:
  push:
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "Taskfile.yml"
      - ".github/workflows/go-vulncheck.yml"
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "Taskfile.yml"
      - ".github/workflows/go-vulncheck.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Two jobs on the same module: the agent's macOS-only CGo compiles only on
  # macOS runners, while the server's Linux-centric stack is cheaper on ubuntu.
  # The per-binary Taskfile tasks (lint:vulncheck:agent, lint:vulncheck:server)
  # scope govulncheck to packages each binary actually reaches, so we flag only
  # vulnerabilities that are present in a shipped artefact.
  vulncheck-agent:
    name: govulncheck (agent)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable

      - uses: arduino/setup-task@24c5e13bce349197642746563945fcdf9355e8f4 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run govulncheck via Taskfile
        run: task lint:vulncheck:agent

  vulncheck-server:
    name: govulncheck (server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Create UI dist placeholder for embed
        run: mkdir -p server/ui/dist && touch server/ui/dist/.gitkeep

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable

      - uses: arduino/setup-task@24c5e13bce349197642746563945fcdf9355e8f4 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run govulncheck via Taskfile
        run: task lint:vulncheck:server
