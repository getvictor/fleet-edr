name: Go vulncheck

on:
  push:
    branches: [main]
    paths:
      - "agent/**"
      - "server/**"
      - ".github/workflows/go-vulncheck.yml"
  pull_request:
    paths:
      - "agent/**"
      - "server/**"
      - ".github/workflows/go-vulncheck.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [agent, server]
    steps:
      - uses: actions/checkout@v4

      - name: Create UI dist placeholder for embed
        if: matrix.module == 'server'
        run: mkdir -p server/ui/dist

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        working-directory: ${{ matrix.module }}
        run: govulncheck ./...
