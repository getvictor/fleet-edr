name: OpenSpec sync

# Behavior changes MUST update the spec. This gate fails a PR that touches a high-signal behavior-bearing path (a
# detection rule, the event wire schema, or the detection DDL) without also touching openspec/ (a canonical spec edit
# under openspec/specs/** and/or an openspec/changes/ proposal).
#
# The gate fires on PATH, not on actual behavior, so it has false positives: a comment fix, refactor, gofmt, or dep bump
# in one of these files touches the path without changing behavior, and there is nothing to spec. The opt-out exists ONLY
# for that case. It is NOT a way to skip updating the spec for a real behavior change. To make that unambiguous (and
# auditable), the opt-out is an explicit assertion that the PR changes NO observable behavior: the `no-behavior-change`
# label or a `[no-behavior-change]` tag in the title. When used, the gate emits a ::notice:: naming the flagged files so
# a reviewer (and Copilot, per .github/copilot-instructions.md) MUST confirm the assertion; misusing it on a behavior
# change is a process violation. Authoring-time reminders live in .github/copilot-instructions.md, the PR template, and
# CLAUDE.md; this is the only one that blocks.

on:
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  openspec-sync:
    name: OpenSpec updated for behavior changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "Not a pull_request event; nothing to enforce."
            exit 0
          fi

          files=$(gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/files" --jq '.[].filename')

          # Behavior-bearing paths: the detection rule catalog (rule logic), the event wire schema, and the detection
          # DDL (persistence semantics). Test files and fixtures under the catalog are not behavior changes.
          BEHAVIOR='^server/rules/internal/catalog/.*\.go$|^schema/events\.json$|^server/detection/bootstrap/schema\.go$'
          behavior_files=$(echo "$files" | grep -E "$BEHAVIOR" | grep -vE '_test\.go$|/fixtures/' || true)

          if [[ -z "$behavior_files" ]]; then
            echo "No behavior-bearing files changed; nothing to enforce."
            exit 0
          fi

          if echo "$files" | grep -qE '^openspec/'; then
            echo "Behavior change accompanied by an openspec/ update. OK. Behavior files:"
            echo "$behavior_files"
            exit 0
          fi

          # Behavior-path files changed with NO openspec update. This is a violation UNLESS the PR explicitly asserts it
          # changes no observable behavior (the only legitimate reason these paths can change without a spec). The
          # assertion is auditable: the ::notice:: below names the files so a reviewer must confirm there is truly no
          # behavior delta. This is NOT a way to skip the spec for a real behavior change.
          if [[ ",$PR_LABELS," == *",no-behavior-change,"* ]] || [[ "$PR_TITLE" == *"[no-behavior-change]"* ]]; then
            {
              echo "::notice::OpenSpec gate: PR asserts 'no-behavior-change' for these behavior-path files. A reviewer MUST confirm no observable behavior changed; if it did, an openspec/ update is required."
              echo "Files asserted non-behavioral:"
              echo "$behavior_files"
            }
            exit 0
          fi

          echo "::error::Behavior-bearing files changed without any openspec/ update."
          {
            echo "These files are an observable behavior change:"
            echo "$behavior_files"
            echo
            echo "Update the spec in the same PR: edit openspec/specs/** (and add an openspec/changes/ proposal),"
            echo "with a spec:<id> test marker for any new or renamed scenario."
            echo
            echo "ONLY if this PR changes no observable behavior (a comment / refactor / gofmt / dep bump in one of"
            echo "these files), assert that with the 'no-behavior-change' label or [no-behavior-change] in the PR title."
            echo "Do NOT use that to skip the spec for a real behavior change."
          } >&2
          exit 1
