# Release workflow. Fires when a tag matching v* pushes. Produces:
#
#   - Signed + notarized macOS .pkg (darwin/arm64) attached to the GitHub Release
#   - Two unsigned .mobileconfig profiles (System Extensions + TCC FDA); MDM channels sign them at delivery
#   - SHA256SUMS for all uploaded artifacts
#   - ghcr.io/getvictor/fleet-edr-server:{tag,latest} for linux/amd64 + arm64
#
# The macos-pkg job is gated on the `release-signing` environment so the
# Developer ID certs + notarytool credentials only decrypt when this workflow
# runs against an allowed tag. Branch protection on the environment must list
# `v*` as the only allowed ref.

name: release

on:
  # spec:release-packaging/real-release-build-is-gated-to-release-tag-refs/tag-push-triggers-a-real-build
  #
  # The `on: push: tags: 'v*'` trigger + the macos-pkg job's `environment: release-signing` gate together enforce the
  # spec scenario: a push of a v* tag triggers this workflow against the protected environment, which decrypts the
  # Developer ID certs and notarytool credentials, producing a signed + notarized + stapled pkg.
  push:
    tags:
      - 'v*'
  # spec:release-packaging/real-release-build-is-gated-to-release-tag-refs/manual-trigger-from-a-non-release-ref-does-not-sign
  #
  # Manual trigger for dry-run / unsigned builds from a topic branch. The DRY_RUN env on the macos-pkg job (below) is set
  # to `--dry-run` whenever github.event_name == 'workflow_dispatch', and every signing/notarization step is guarded by
  # `if: env.DRY_RUN == ''`. The protected release-signing environment grants secrets only when the workflow runs against
  # the configured allowed refs; the dry-run guard is defense in depth.
  workflow_dispatch: {}

# Top-level `permissions: {}` grants nothing (does not trigger Sonar
# githubactions:S8264, which forbids granting read scopes at workflow level)
# while still satisfying Scorecard Token-Permissions. Each job below
# escalates for its specific needs; there is deliberately no read-only
# default to fall back to.
permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # OpenSpec deltas are archived in one batch at release time (docs/release-checklist.md), not per-merge. Any folder under
  # openspec/changes other than archive/ is a merged change not yet folded into openspec/specs, so the release must not ship.
  # Every publishing job below depends on this via needs:, so a v* tag push fails here before any signing. On a
  # workflow_dispatch dry-run the gate is advisory (a topic branch legitimately carries in-flight changes).
  openspec-archived:
    name: OpenSpec archived for release
    runs-on: ubuntu-latest
    permissions:
      contents: read  # checkout only: the gate reads the openspec/changes tree
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Fail if any OpenSpec change is left un-archived
        env:
          IS_RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          # Fail-safe by design: this is a release-blocking gate, so a real filesystem/runtime error must NOT be misread as
          # "nothing pending". set -euo pipefail surfaces any unexpected failure as a job failure rather than a silent pass,
          # and find runs without `2>/dev/null || true` so its errors propagate. A missing openspec/changes tree is the only
          # benign "no pending changes" case and is handled explicitly.
          set -euo pipefail
          if [ ! -d openspec/changes ]; then
            echo "No openspec/changes tree; nothing to archive."
            exit 0
          fi
          pending=$(find openspec/changes -mindepth 1 -maxdepth 1 -type d ! -name archive -printf '%f\n')
          if [ -z "$pending" ]; then
            echo "No un-archived OpenSpec changes; release may proceed."
            exit 0
          fi
          echo "Un-archived OpenSpec changes present:"
          echo "$pending"
          if [ "$IS_RELEASE_TAG" = "true" ]; then
            echo "::error::Archive all completed OpenSpec changes before tagging a release (see docs/release-checklist.md)."
            exit 1
          fi
          echo "::warning::Dry-run from a non-tag ref: archive gate is advisory, not failing."

  macos-pkg:
    name: Build + sign + notarize pkg
    needs: openspec-archived
    runs-on: macos-15  # pin: needs Xcode 16.3+ (project objectVersion 77)
    environment: release-signing
    permissions:
      contents: write     # gh release create: publish pkg + profiles on tag push
      id-token: write     # Sigstore keyless signing: GitHub OIDC token used as the cosign identity
      attestations: write # actions/attest-build-provenance: store provenance against the repo

    env:
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && '--dry-run' || '' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          # Release builds run on tag push + workflow_dispatch; cache reuse
          # for rare events risks cache poisoning and does not meaningfully
          # speed up a human-waited release.
          cache: false

      - name: Import signing identities
        if: env.DRY_RUN == ''
        env:
          APPLE_DEV_ID_APP_P12_BASE64: ${{ secrets.APPLE_DEV_ID_APP_P12_BASE64 }}
          APPLE_DEV_ID_APP_P12_PASSWORD: ${{ secrets.APPLE_DEV_ID_APP_P12_PASSWORD }}
          APPLE_DEV_ID_INSTALLER_P12_BASE64: ${{ secrets.APPLE_DEV_ID_INSTALLER_P12_BASE64 }}
          APPLE_DEV_ID_INSTALLER_P12_PASSWORD: ${{ secrets.APPLE_DEV_ID_INSTALLER_P12_PASSWORD }}
        run: ./packaging/pkg/ci-setup.sh

      # spec:release-packaging/hardened-runtime-code-signing-of-executables/notary-accepts-the-package
      # spec:release-packaging/hardened-runtime-code-signing-of-executables/system-extension-activates-on-a-sip-enabled-host
      # spec:release-packaging/notarization-and-stapling/released-package-is-stapled
      #
      # build.sh's non-dry-run path: codesign every Mach-O with the hardened runtime + secure timestamp + per-bundle
      # entitlements; submit the pkg to `notarytool submit --wait`; on acceptance, `stapler staple` the ticket. The notary
      # accepting + the per-bundle entitlements being present in the signed bundle are what make the system extension load
      # on a stock SIP-enabled host (the entitlements are restricted and only take effect once Apple's notary signs off).
      # All three scenarios share this enforcement step.
      - name: Build, sign, notarize, staple pkg
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
          # Route github.ref_name through an env var instead of interpolating
          # directly into the run shell so a crafted tag cannot inject
          # shell syntax (zizmor:template-injection).
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if [ -n "$DRY_RUN" ]; then
            ./packaging/pkg/build.sh "$RELEASE_TAG" --dry-run
          else
            ./packaging/pkg/build.sh "$RELEASE_TAG"
          fi

      # spec:release-packaging/mobile-configuration-profiles-ship-alongside-the-package/profiles-are-rendered-unsigned
      #
      # Both branches render the .mobileconfig templates with APPLE_TEAM_ID substituted and ship them UNSIGNED. The
      # system-extension and TCC payloads are MDM-only, every supported MDM channel (Fleet, Jamf, Kandji, Intune, mosyle)
      # signs profiles itself at delivery time, and Fleet rejects a pre-signed upload outright. Download authenticity is
      # provided by the cosign signatures attached below, not by a CMS wrapper on the profile.
      - name: Render mobileconfig profiles
        if: env.DRY_RUN == ''
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ./packaging/profiles/render.sh

      # spec:release-packaging/mobile-configuration-profiles-ship-alongside-the-package/profiles-are-rendered-unsigned
      #
      # The dry-run branch (workflow_dispatch from a topic branch) renders the same templates with the literal
      # APPLE_TEAM_ID hardcoded above, so operators inspecting the dry-run artifacts can verify the team id substitution
      # + template content. The output is byte-identical to a real release's profiles for the same team id.
      - name: Render mobileconfig profiles (dry-run)
        if: env.DRY_RUN != ''
        env:
          APPLE_TEAM_ID: FDG8Q7N4CC
        run: ./packaging/profiles/render.sh

      # Source-tree SBOMs in both common formats, generated BEFORE
      # SHA256SUMS so the SBOM files get hashed alongside the pkg and
      # profiles. SPDX is the OSI-friendly default; CycloneDX is what
      # most security scanners ingest. Anchore syft sees the workspace
      # state after `go build` ran above, so the Go module graph + npm
      # tree are both populated and make it into the manifest. We
      # publish both flavors to dodge "I only consume X" pushback.
      - name: Generate SPDX SBOM (source tree)
        if: env.DRY_RUN == '' && startsWith(github.ref, 'refs/tags/v')
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: '.'
          format: spdx-json
          artifact-name: fleet-edr-${{ github.ref_name }}-sbom.spdx.json
          output-file: dist/fleet-edr-${{ github.ref_name }}-sbom.spdx.json
          upload-release-assets: false

      - name: Generate CycloneDX SBOM (source tree)
        if: env.DRY_RUN == '' && startsWith(github.ref, 'refs/tags/v')
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: '.'
          format: cyclonedx-json
          artifact-name: fleet-edr-${{ github.ref_name }}-sbom.cdx.json
          output-file: dist/fleet-edr-${{ github.ref_name }}-sbom.cdx.json
          upload-release-assets: false

      - name: Generate SHA256SUMS
        run: |
          cd dist
          # SBOMs are only present on real (tag-triggered) runs; the
          # nullglob lets the line below collapse cleanly when they're
          # absent on a dry-run.
          shopt -s nullglob
          shasum -a 256 \
            ./fleet-edr-*.pkg \
            ./*.mobileconfig \
            ./fleet-edr-*-sbom.spdx.json \
            ./fleet-edr-*-sbom.cdx.json \
            > SHA256SUMS
          cat SHA256SUMS

      - name: Upload artifacts (dry-run)
        if: env.DRY_RUN != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fleet-edr-dryrun-${{ github.sha }}
          path: |
            dist/fleet-edr-*.pkg
            dist/*.mobileconfig
            dist/SHA256SUMS
          retention-days: 7

      - name: Create GitHub Release
        if: env.DRY_RUN == '' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        # Use `gh release` directly instead of a third-party action: keeps the
        # token scope bounded and removes one unpinned external dependency.
        run: |
          # SemVer 2.0 pre-release tags contain a hyphen (v0.1.0-rc.1,
          # v1.0.0-beta.2). Mark those as GitHub pre-releases so they don't
          # show up as the default "Latest" on the releases page and don't
          # trigger release notifications for watchers who asked for
          # stable-only. GA tags (v0.1.0, v1.2.3) become the Latest release.
          PRERELEASE_FLAG=""
          case "$RELEASE_TAG" in
              *-*) PRERELEASE_FLAG="--prerelease" ;;
          esac
          # shellcheck disable=SC2086
          gh release create "$RELEASE_TAG" \
            --generate-notes \
            --title "$RELEASE_TAG" \
            $PRERELEASE_FLAG \
            dist/fleet-edr-*.pkg \
            dist/edr-system-extension.mobileconfig \
            dist/edr-tcc-fda.mobileconfig \
            "dist/fleet-edr-${RELEASE_TAG}-sbom.spdx.json" \
            "dist/fleet-edr-${RELEASE_TAG}-sbom.cdx.json" \
            dist/SHA256SUMS

      # Sigstore keyless signing of every release artifact. Skipped on
      # workflow_dispatch (DRY_RUN): a successful sign appends to Rekor's
      # public transparency log, so dry-runs would leak commit SHAs and
      # synthetic tags into a permanent record. Real tag pushes only.
      - name: Install cosign
        if: env.DRY_RUN == '' && startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v3.1.1'

      - name: Sign release artifacts (cosign keyless)
        if: env.DRY_RUN == '' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          # cosign reads the GitHub OIDC request URL/token from
          # ACTIONS_ID_TOKEN_REQUEST_URL/TOKEN, which the runner exposes
          # automatically because the job declares `id-token: write`.
          # COSIGN_YES skips the interactive "are you sure?" confirmation
          # for non-interactive CI runs: equivalent to passing --yes on
          # every cosign invocation below.
          COSIGN_YES: 'true'
        # `cosign sign-blob --bundle` emits a single Sigstore bundle
        # (<file>.sigstore.json, media type
        # application/vnd.dev.sigstore.bundle.v0.3+json) per artifact,
        # carrying the signature, the ephemeral Fulcio signing cert, AND
        # the Rekor transparency-log proof in one file. cosign v3 makes
        # this format the default, so no --new-bundle-format flag is
        # needed and the legacy --output-signature/--output-certificate
        # .sig/.pem pair is gone. Every shipped file gets the same
        # treatment (pkg, mobileconfigs, SHA256SUMS, AND both SBOMs), so
        # a tampered SBOM is just as detectable as a tampered pkg.
        # Verifiers run `cosign verify-blob --bundle <file>.sigstore.json
        # --certificate-identity-regexp ... --certificate-oidc-issuer
        # https://token.actions.githubusercontent.com <file>` without
        # contacting our infrastructure.
        # spec:release-packaging/release-artifacts-carry-a-verifiable-sigstore-signature/each-released-artifact-verifies-against-its-published-bundle
        run: |
          cd dist
          for f in \
              fleet-edr-*.pkg \
              edr-system-extension.mobileconfig \
              edr-tcc-fda.mobileconfig \
              "fleet-edr-${RELEASE_TAG}-sbom.spdx.json" \
              "fleet-edr-${RELEASE_TAG}-sbom.cdx.json" \
              SHA256SUMS; do
            cosign sign-blob \
              --bundle "${f}.sigstore.json" \
              "$f"
          done
          gh release upload "$RELEASE_TAG" \
            ./fleet-edr-*.pkg.sigstore.json \
            ./edr-system-extension.mobileconfig.sigstore.json \
            ./edr-tcc-fda.mobileconfig.sigstore.json \
            "./fleet-edr-${RELEASE_TAG}-sbom.spdx.json.sigstore.json" \
            "./fleet-edr-${RELEASE_TAG}-sbom.cdx.json.sigstore.json" \
            ./SHA256SUMS.sigstore.json

      # SLSA build provenance for every shipped artifact. The action
      # produces an in-toto v1.0 statement signed by Sigstore (keyless via
      # OIDC, same identity model as the cosign step above) and stores it
      # as a GitHub Attestation that anyone can resolve via
      # `gh attestation verify <file> --owner getvictor`. We claim build
      # level 2 in practice: the macOS runner is GitHub-hosted but the
      # Apple notary submission is a network call that violates SLSA L3's
      # hermeticity requirement. Documenting the gap rather than over-
      # claiming.
      - name: Attest pkg + profiles + SBOMs + SHA256SUMS
        if: env.DRY_RUN == '' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/fleet-edr-*.pkg
            dist/edr-system-extension.mobileconfig
            dist/edr-tcc-fda.mobileconfig
            dist/fleet-edr-*-sbom.spdx.json
            dist/fleet-edr-*-sbom.cdx.json
            dist/SHA256SUMS

      - name: Teardown keychain
        if: always() && env.DRY_RUN == ''
        run: |
          if [ -n "${CI_KEYCHAIN:-}" ]; then
            security delete-keychain "$CI_KEYCHAIN" || true
          fi

  docker-server:
    name: Build + push server image
    needs: openspec-archived
    runs-on: ubuntu-latest
    permissions:
      contents: read      # checkout source for the build context
      packages: write     # push multi-arch image to ghcr.io/getvictor/fleet-edr-server
      id-token: write     # Sigstore keyless signing of the pushed image
      attestations: write # actions/attest-build-provenance for the image
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          # `:latest` only advances on stable releases. SemVer 2.0 pre-release
          # tags (e.g. v0.1.0-rc.1, v0.1.0-beta.2) contain a `-` so
          # `!contains(RELEASE_TAG, '-')` treats them as non-stable and skips
          # advancing `:latest`. Pilot operators pulling `:latest` get the
          # most recent GA, not whatever RC shipped last.
          tags: |
            ghcr.io/getvictor/fleet-edr-server:${{ env.RELEASE_TAG }}
            ${{ startsWith(github.ref, 'refs/tags/v') && !contains(env.RELEASE_TAG, '-') && 'ghcr.io/getvictor/fleet-edr-server:latest' || '' }}
          build-args: |
            VERSION=${{ env.RELEASE_TAG }}
            COMMIT=${{ github.sha }}

      # Sigstore keyless signing of the pushed image. Pinning to the digest
      # (not the tag) means a future malicious overwrite of `:RELEASE_TAG`
      # cannot pass `cosign verify` against this signature; verifiers either
      # pull by digest or accept that a tag mutation invalidates the proof.
      # cosign v3 stores the signature as an OCI 1.1 referring artifact
      # (not the legacy `sha256-<digest>.sig` tag); `cosign verify` auto-
      # detects both layouts, so verifiers on cosign v3 are unaffected.
      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v3.1.1'

      - name: Sign image (cosign keyless)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          COSIGN_YES: 'true'
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign \
            "ghcr.io/getvictor/fleet-edr-server@${IMAGE_DIGEST}"

      # SBOM of the pushed image (manifest digest pinning means the SBOM
      # describes the exact bits a customer pulls, not whatever happens
      # to be at the tag later). Generation is split from publication:
      # anchore/sbom-action only produces the file and uploads it as a
      # workflow artifact; the next step is what actually pushes it to
      # the OCI registry as a cosign attestation, which is what makes
      # `cosign verify-attestation --type spdxjson <ref>` work for
      # downstream verifiers.
      #
      # upload-release-assets: false is load-bearing: the action's
      # default would race the parallel macos-pkg job for the GitHub
      # Release that owns the source-tree SBOMs. The image SBOM lives
      # in the registry, not in the Release.
      - name: Generate image SBOM (SPDX)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/getvictor/fleet-edr-server@${{ steps.build.outputs.digest }}
          format: spdx-json
          artifact-name: fleet-edr-server-${{ env.RELEASE_TAG }}-sbom.spdx.json
          output-file: /tmp/fleet-edr-server-sbom.spdx.json
          upload-release-assets: false

      - name: Attach image SBOM as cosign attestation
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          COSIGN_YES: 'true'
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        # `cosign attest` wraps the SBOM in an in-toto envelope, signs it
        # via the same Fulcio OIDC identity used for the image signature,
        # and pushes it to the registry alongside the manifest (an OCI 1.1
        # referring artifact under cosign v3). Verifiers resolve it with
        # `cosign verify-attestation --type spdxjson <ref>` (returns +
        # verifies the signed envelope) or `cosign download attestation
        # <ref>` (returns the raw envelope). Note: `cosign download sbom`
        # is for `cosign attach sbom` attachments, not attestations, and
        # is deprecated; it does NOT return this SBOM.
        run: |
          cosign attest \
            --predicate /tmp/fleet-edr-server-sbom.spdx.json \
            --type spdxjson \
            "ghcr.io/getvictor/fleet-edr-server@${IMAGE_DIGEST}"

      - name: Attest image build provenance
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/getvictor/fleet-edr-server
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  docker-demo-seed:
    name: Build + push demo-seed image
    needs: openspec-archived
    runs-on: ubuntu-latest
    # Separate job (not a matrix with docker-server) so the proven server-release
    # path stays byte-identical. This is the one-shot seeder for the Mac-free
    # docker demo (docker-compose.demo.yml), built + pushed alongside the server
    # image so the demo can pin both to the same released tag.
    permissions:
      contents: read      # checkout source for the build context
      packages: write     # push multi-arch image to ghcr.io/getvictor/fleet-edr-demo-seed
      id-token: write     # Sigstore keyless signing of the pushed image
      attestations: write # actions/attest-build-provenance for the image
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: server/Dockerfile.demo-seed
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          # `:latest` only advances on stable releases, matching the server image
          # (pre-release tags contain a `-`).
          tags: |
            ghcr.io/getvictor/fleet-edr-demo-seed:${{ env.RELEASE_TAG }}
            ${{ startsWith(github.ref, 'refs/tags/v') && !contains(env.RELEASE_TAG, '-') && 'ghcr.io/getvictor/fleet-edr-demo-seed:latest' || '' }}

      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v3.1.1'

      - name: Sign image (cosign keyless)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          COSIGN_YES: 'true'
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign \
            "ghcr.io/getvictor/fleet-edr-demo-seed@${IMAGE_DIGEST}"

      # Full supply-chain parity with the server image: the seeder is published to the
      # same public registry, so it gets a cosign-attested SBOM + SLSA provenance too.
      - name: Generate image SBOM (SPDX)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/getvictor/fleet-edr-demo-seed@${{ steps.build.outputs.digest }}
          format: spdx-json
          artifact-name: fleet-edr-demo-seed-${{ env.RELEASE_TAG }}-sbom.spdx.json
          output-file: /tmp/fleet-edr-demo-seed-sbom.spdx.json
          upload-release-assets: false

      - name: Attach image SBOM as cosign attestation
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          COSIGN_YES: 'true'
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign attest \
            --predicate /tmp/fleet-edr-demo-seed-sbom.spdx.json \
            --type spdxjson \
            "ghcr.io/getvictor/fleet-edr-demo-seed@${IMAGE_DIGEST}"

      - name: Attest image build provenance
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/getvictor/fleet-edr-demo-seed
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
