name: Markdown lint

# See go-lint.yml for the gate-then-analyze pattern rationale.
#
# Two gates, scoped not to overlap:
#   - markdownlint (.markdownlint-cli2.yaml) owns structure: MD040 (untagged
#     fenced code blocks), MD031/MD032/MD022/MD009/MD012 (whitespace hygiene),
#     MD041 (first-line heading).
#   - Prettier (.prettierrc.yaml, proseWrap: never) owns prose wrapping + table
#     column alignment, matching the repo's no-hard-wrap convention.

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.yaml"
      - ".prettierrc.yaml"
      - ".prettierignore"
      - "Taskfile.yml"
      - ".github/workflows/md-lint.yml"
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect markdown changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relevant: ${{ steps.detect.outputs.relevant }}
    steps:
      - id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          PATTERN='\.md$|^\.markdownlint-cli2\.yaml$|^\.prettierrc\.yaml$|^\.prettierignore$|^Taskfile\.yml$|^\.github/workflows/md-lint\.yml$'
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "Triggered by $EVENT_NAME; running unconditionally."
            exit 0
          fi
          files=$(gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/files" --jq '.[].filename')
          if echo "$files" | grep -qE "$PATTERN"; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "Relevant changes:"
            echo "$files" | grep -E "$PATTERN"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "No relevant changes; skipping md-lint."
          fi

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.50.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint markdown structure via Taskfile
        run: task lint:md

      - name: Check markdown prose wrap + table style via Taskfile
        run: task lint:md:prose
