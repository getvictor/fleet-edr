name: CodeQL

# Semantic / dataflow analysis for the three languages this repo ships:
# Go (server + agent), Swift (macOS extensions + host app), and
# TypeScript/JavaScript (React UI). zizmor already covers Actions so we
# deliberately don't enable CodeQL's Actions pack here; running both would
# double-report template-injection and permissions findings without adding
# value.
#
# Results upload to GitHub code-scanning in the same dashboard as zizmor +
# SonarQube + GHAS findings.
#
# Gate-then-analyze pattern: a single `changes` job inspects the PR's file
# list and emits one boolean per language. Each language job is skipped
# via `if:` when its files weren't touched, which keeps Swift's 15+ minute
# Xcode build off PRs that only touch Go (and vice versa). A skipped
# required check is treated as success by branch protection. Pushes,
# scheduled scans, and workflow_dispatch always run all three.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scheduled scan: catches findings in code that didn't change
    # but where CodeQL query packs were updated upstream.
    - cron: "23 6 * * 1"  # Mon 06:23 UTC
  workflow_dispatch: {}

# Top-level token has no permissions; each job grants the exact scopes it
# needs (satisfies Scorecard Token-Permissions, Sonar githubactions:S8264,
# zizmor excessive-permissions).
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect language changes
    runs-on: ubuntu-latest
    permissions:
      contents: read       # baseline; the detect step doesn't actually checkout
      pull-requests: read  # gate job reads the PR's file list via gh api pulls/<n>/files
    outputs:
      go: ${{ steps.detect.outputs.go }}
      swift: ${{ steps.detect.outputs.swift }}
      typescript: ${{ steps.detect.outputs.typescript }}
    steps:
      - id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            {
              echo "go=true"
              echo "swift=true"
              echo "typescript=true"
            } >> "$GITHUB_OUTPUT"
            echo "Triggered by $EVENT_NAME; running all three languages."
            exit 0
          fi
          files=$(gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/files" --jq '.[].filename')
          GO_PATTERN='\.go$|(^|/)go\.(mod|sum)$|^\.github/workflows/codeql\.yml$'
          SWIFT_PATTERN='\.swift$|^extension/|^\.github/workflows/codeql\.yml$'
          TS_PATTERN='^ui/.*\.(ts|tsx|js|jsx|cjs|mjs|json)$|^\.github/workflows/codeql\.yml$'
          for entry in "go:$GO_PATTERN" "swift:$SWIFT_PATTERN" "typescript:$TS_PATTERN"; do
            lang=${entry%%:*}
            pat=${entry#*:}
            if echo "$files" | grep -qE "$pat"; then
              echo "$lang=true" >> "$GITHUB_OUTPUT"
              echo "$lang relevant; will run analysis."
            else
              echo "$lang=false" >> "$GITHUB_OUTPUT"
              echo "$lang not touched; skipping."
            fi
          done

  # --------------------------------------------------------------
  # Go: server + agent + internal/. CodeQL's Go extractor requires an
  # actual build (build-mode: none is JS/TS/Python-only). autobuild runs
  # `go build ./...` which covers every package in the module. CGo in the
  # agent's receiver package builds on Linux only with the macOS-specific
  # tags missing, so the extractor sees the server + agent interfaces even
  # though macOS-only files are skipped.
  # --------------------------------------------------------------
  go:
    name: CodeQL Go
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write  # upload SARIF to code-scanning
      contents: read           # checkout source
      actions: read            # codeql init reads action metadata online
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: false  # CodeQL manages its own cache; avoid mixing layers

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4.35.5
        with:
          languages: go
          build-mode: autobuild
          queries: security-extended  # adds dataflow-heavy queries beyond default

      - name: Autobuild
        uses: github/codeql-action/autobuild@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4.35.5

      - name: Analyze
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4.35.5
        with:
          category: "/language:go"

  # --------------------------------------------------------------
  # Swift: extension/edr/ (host app + sysext + network extension).
  # Requires macOS + Xcode; runs on macos-15 (Xcode 16.4+) because the
  # project is at objectVersion 77 and older Xcode can't open it.
  # build-mode: manual with explicit xcodebuild matches pkg-dryrun so the
  # same scheme + arch story is exercised.
  # --------------------------------------------------------------
  swift:
    name: CodeQL Swift
    needs: changes
    if: needs.changes.outputs.swift == 'true'
    runs-on: macos-15  # pin: needs Xcode 16.3+ (project objectVersion 77)
    timeout-minutes: 30
    permissions:
      security-events: write  # upload SARIF to code-scanning
      contents: read           # checkout source + Xcode project
      actions: read            # codeql init reads action metadata online
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Xcode version
        # Log which Xcode the runner picked so future project-format
        # failures surface directly (same pattern as pkg-dryrun).
        run: xcodebuild -version

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4.35.5
        with:
          languages: swift
          build-mode: manual
          queries: security-extended

      - name: Cache Swift compile artifacts
        # Two-tier cache. ModuleCache.noindex is the SHARED precompiled-.swiftmodule
        # cache for the stdlib + system frameworks (per-Xcode-version, not per-project);
        # always safe to reuse because CodeQL's extractor doesn't depend on it. The
        # project-specific SwiftCompileCache holds per-compile-input outputs; on a cache
        # hit Xcode pulls the result from cache instead of re-invoking swiftc, which
        # means CodeQL's swiftc wrapper never observes those files. The primary key
        # hashes every .swift source + the pbxproj + Package.swift so any source change
        # invalidates the whole cache and the next run is a full build (full CodeQL
        # coverage). The restore-keys fall back to a stale cache when only Swift files
        # changed: that path trades some CodeQL coverage on unchanged files for build
        # speed on PR re-runs. If CodeQL findings drop unexpectedly after this lands,
        # remove the second restore-keys entry to keep the cache exact-match-only.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
            ~/Library/Developer/Xcode/DerivedData/edr-*/Build/Intermediates.noindex/SwiftCompileCache
          key: codeql-swift-${{ runner.os }}-${{ hashFiles('extension/edr/edr.xcodeproj/project.pbxproj', 'extension/edr/Package.swift') }}-${{ hashFiles('extension/**/*.swift') }}
          restore-keys: |
            codeql-swift-${{ runner.os }}-${{ hashFiles('extension/edr/edr.xcodeproj/project.pbxproj', 'extension/edr/Package.swift') }}-
            codeql-swift-${{ runner.os }}-

      - name: Build Xcode project for CodeQL
        # Swift's extractor observes the compile, so we must actually build the project
        # during the CodeQL trace. Ad-hoc signing is fine for analysis; we're not
        # packaging.
        #
        # Flags worth noting:
        #   - COMPILER_INDEX_STORE_ENABLE=NO disables Xcode's parallel SourceKit indexing
        #     during compilation. CodeQL has its own trace mechanism that doesn't use the
        #     index store, so the indexing is pure overhead in this job (~10-30% saving
        #     observed on similar Swift-heavy CodeQL pipelines).
        #   - -skipPackagePluginValidation + -skipMacroValidation skip SwiftPM plugin /
        #     macro signature checks that aren't relevant when no untrusted plugins or
        #     macros are in the dependency tree (this project has neither).
        run: |
          xcodebuild \
            -project extension/edr/edr.xcodeproj \
            -scheme edr \
            -configuration Debug \
            -destination 'generic/platform=macOS' \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build

      - name: Analyze
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4.35.5
        with:
          category: "/language:swift"

  # --------------------------------------------------------------
  # TypeScript + JavaScript: ui/ React + Vite + vitest surface.
  # build-mode: none is the default for JS/TS; CodeQL indexes the source
  # without needing npm ci or vite build.
  # --------------------------------------------------------------
  typescript:
    name: CodeQL TypeScript
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write  # upload SARIF to code-scanning
      contents: read           # checkout source tree
      actions: read            # codeql init reads action metadata online
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4.35.5
        with:
          languages: javascript-typescript
          build-mode: none
          queries: security-extended

      - name: Analyze
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4.35.5
        with:
          category: "/language:javascript-typescript"
