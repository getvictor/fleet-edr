name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: sonarcloud-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: SonarCloud scan
    # Dependabot-triggered PR runs cannot access Actions secrets (deliberate
    # GitHub policy: prevents a compromised upstream action from stealing
    # SONAR_TOKEN via a dep bump). Without the token the scanner can't reach a
    # private project, so it's guaranteed to fail. The bumps also don't touch
    # any source Sonar analyses, so skipping it loses zero signal.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    environment: sonarcloud
    # Boot MySQL so the DB-dependent Go tests can run as part of coverage
    # collection. Kept on 3317 to match the docker-compose dev wiring so the
    # `EDR_TEST_DSN` we pass below is identical to what devs use locally.
    services:
      mysql_test:
        # Pinned to the mysql:8.4 digest zizmor requires — refresh via
        # `docker inspect mysql:8.4 --format '{{.RepoDigests}}'` after a
        # deliberate image bump.
        image: mysql@sha256:43bd9764df60666fb2ba2cf8217dd17b3d2414c150005d2fdd07a0cd73d3b7f5
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
        ports:
          - 3317:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15
    # 25 min cap: MySQL boot (~20s) + Go tests w/ coverage + race (~3-4 min)
    # + UI tests (~10s) + scan (~30s). Current real runtime ~5 min.
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Shallow clones disable Sonar blame assignment — keep full history.
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.0.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Run Go tests with coverage
        env:
          EDR_TEST_DSN: root@tcp(127.0.0.1:3317)/edr_test?parseTime=true
        run: |
          go test -race -count=1 -timeout=10m \
            -coverprofile=coverage.out -covermode=atomic \
            ./server/... ./agent/... ./internal/...
          echo "--- coverage summary ---"
          go tool cover -func=coverage.out | tail -1

      - name: Run UI tests with coverage
        working-directory: ui
        run: npm run test:coverage

      - uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
