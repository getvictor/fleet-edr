name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # agent-test + server-test both run on macos-latest because the agent's
  # CGo receiver links -framework Foundation with no darwin build tag, so
  # it won't build on ubuntu. Coverage is collected here (not re-run in
  # the Sonar job) to avoid duplicate Go test runs.
  agent-test:
    name: Agent tests
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.50.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run agent tests with coverage
        run: task test:go:agent:coverage

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-agent
          path: coverage-agent.out
          if-no-files-found: error
          retention-days: 1

  server-test:
    name: Server tests
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      EDR_TEST_DSN: "root:@tcp(127.0.0.1:3306)/edr_test?parseTime=true"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Create UI dist placeholder for embed
        run: mkdir -p server/ui/dist && touch server/ui/dist/.gitkeep

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.50.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install MySQL 8.4
        run: brew install mysql@8.4

      - name: Initialize and start MySQL
        run: |
          MYSQL_PREFIX="$(brew --prefix mysql@8.4)"
          echo "${MYSQL_PREFIX}/bin" >> "$GITHUB_PATH"
          "${MYSQL_PREFIX}/bin/mysqld" --initialize-insecure --datadir="${MYSQL_PREFIX}/data"
          "${MYSQL_PREFIX}/bin/mysqld_safe" --datadir="${MYSQL_PREFIX}/data" &

      - name: Wait for MySQL
        timeout-minutes: 2
        run: |
          MYSQL_PREFIX="$(brew --prefix mysql@8.4)"
          for i in $(seq 1 60); do
            if "${MYSQL_PREFIX}/bin/mysqladmin" ping --silent 2>/dev/null; then
              echo "MySQL is ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "MySQL failed to start"
          exit 1

      - name: Create test database
        run: |
          MYSQL_PREFIX="$(brew --prefix mysql@8.4)"
          "${MYSQL_PREFIX}/bin/mysql" -u root -e "CREATE DATABASE IF NOT EXISTS edr_test"

      # test:go:server:coverage reads $EDR_TEST_DSN from the environment (set
      # above) and otherwise falls back to the docker-compose port used locally.
      - name: Run server tests with coverage
        run: task test:go:server:coverage

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-server
          path: coverage-server.out
          if-no-files-found: error
          retention-days: 1

  # Single source of test execution for the UI bundle. Uploads the
  # coverage-ui artifact that sonarcloud + codecov below consume.
  # ts-lint.yml owns lint + type-check; this job owns vitest.
  ui-test:
    name: UI tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.50.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install UI dependencies
        working-directory: ui
        # --ignore-scripts: our deps (sass, vitest, jsdom, etc.) are pure JS
        # and don't need pre/post-install scripts; skipping them closes the
        # arbitrary-code-execution surface flagged by Sonar rule S6505.
        run: npm ci --ignore-scripts

      # task test:ui:coverage runs vitest + writes ui/coverage/lcov.info,
      # falling back to an empty lcov when zero tests exist (vitest's v8
      # provider skips the write under passWithNoTests). Sonar/Codecov
      # both treat empty lcov as "no data" rather than an error.
      - name: Run UI tests with coverage
        run: task test:ui:coverage

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-ui
          path: ui/coverage/lcov.info
          # Empty lcov.info is allowed (zero tests case); Sonar/Codecov
          # tolerate empty input. Keep error here so a missing file still
          # signals a real upload-step failure.
          if-no-files-found: error
          retention-days: 1

  sonarcloud:
    name: SonarCloud scan
    needs: [agent-test, server-test, ui-test]
    # Dependabot-triggered PR runs cannot access Actions secrets (deliberate
    # GitHub policy: prevents a compromised upstream action from stealing
    # SONAR_TOKEN via a dep bump). Without the token the scanner can't reach a
    # private project, so it's guaranteed to fail. The bumps also don't touch
    # any source Sonar analyses, so skipping it loses zero signal.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    environment: sonarcloud
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Shallow clones disable Sonar blame assignment; keep full history.
          fetch-depth: 0
          persist-credentials: false

      - name: Download agent coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-agent

      - name: Download server coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-server

      # ui-test job uploads coverage-ui (ui/coverage/lcov.info). Sonar's
      # sonar.javascript.lcov.reportPaths in sonar-project.properties expects
      # the file at that exact path, so re-create the directory layout.
      - name: Download UI coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-ui
          path: ui/coverage

      - uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  codecov:
    name: Codecov upload
    needs: [agent-test, server-test, ui-test]
    # Same exclusion logic as sonarcloud: Dependabot PRs cannot read repo
    # secrets, so a CODECOV_TOKEN-gated upload would always fail. Coverage
    # files for dep bumps don't change project numbers in any meaningful way,
    # so skipping the upload loses no signal.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    # CODECOV_TOKEN lives in the `codecov` environment so branch-protection
    # policies can constrain which refs can read it (same pattern as the
    # `sonarcloud` and `release-signing` environments).
    environment: codecov
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Codecov reads git history to attribute coverage to commits;
          # shallow clones drop blame data the dashboard expects.
          fetch-depth: 0
          persist-credentials: false

      - name: Download agent coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-agent

      - name: Download server coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-server

      # No UI coverage upload here: codecov.yml ignores ui/src/**
      # globally (no UI tests yet), so a `ui`-flagged upload would be a
      # no-op. Sonarcloud still downloads coverage-ui because Sonar reads
      # the lcov per sonar-project.properties even when empty. Re-add the
      # download + upload steps when UI tests land.
      - name: Upload agent coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage-agent.out
          flags: agent
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload server coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage-server.out
          flags: server
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
