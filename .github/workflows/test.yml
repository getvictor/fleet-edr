name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # agent-test + server-test both run on macos-latest because the agent's
  # CGo receiver links -framework Foundation with no darwin build tag, so
  # it won't build on ubuntu. Coverage is collected here (not re-run in
  # the Sonar job) to avoid duplicate Go test runs.
  agent-test:
    name: Agent tests
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.50.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run agent tests with coverage
        run: task test:go:agent:coverage

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-agent
          path: coverage-agent.out
          if-no-files-found: error
          retention-days: 1

  server-test:
    name: Server tests
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      EDR_TEST_DSN: "root:@tcp(127.0.0.1:3306)/edr_test?parseTime=true"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Create UI dist placeholder for embed
        run: mkdir -p server/ui/dist && touch server/ui/dist/.gitkeep

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.50.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install MySQL 8.4
        run: brew install mysql@8.4

      - name: Initialize and start MySQL
        run: |
          MYSQL_PREFIX="$(brew --prefix mysql@8.4)"
          echo "${MYSQL_PREFIX}/bin" >> "$GITHUB_PATH"
          "${MYSQL_PREFIX}/bin/mysqld" --initialize-insecure --datadir="${MYSQL_PREFIX}/data"
          "${MYSQL_PREFIX}/bin/mysqld_safe" --datadir="${MYSQL_PREFIX}/data" &

      - name: Wait for MySQL
        timeout-minutes: 2
        run: |
          MYSQL_PREFIX="$(brew --prefix mysql@8.4)"
          for i in $(seq 1 60); do
            if "${MYSQL_PREFIX}/bin/mysqladmin" ping --silent 2>/dev/null; then
              echo "MySQL is ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "MySQL failed to start"
          exit 1

      - name: Create test database
        run: |
          MYSQL_PREFIX="$(brew --prefix mysql@8.4)"
          "${MYSQL_PREFIX}/bin/mysql" -u root -e "CREATE DATABASE IF NOT EXISTS edr_test"

      # test:go:server:coverage reads $EDR_TEST_DSN from the environment (set
      # above) and otherwise falls back to the docker-compose port used locally.
      - name: Run server tests with coverage
        run: task test:go:server:coverage

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-server
          path: coverage-server.out
          if-no-files-found: error
          retention-days: 1

  sonarcloud:
    name: SonarCloud scan
    needs: [agent-test, server-test]
    # Dependabot-triggered PR runs cannot access Actions secrets (deliberate
    # GitHub policy: prevents a compromised upstream action from stealing
    # SONAR_TOKEN via a dep bump). Without the token the scanner can't reach a
    # private project, so it's guaranteed to fail. The bumps also don't touch
    # any source Sonar analyses, so skipping it loses zero signal.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    environment: sonarcloud
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Shallow clones disable Sonar blame assignment; keep full history.
          fetch-depth: 0
          persist-credentials: false

      - name: Download agent coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-agent

      - name: Download server coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-server

      # UI coverage is generated here rather than pulled from the ts-lint
      # workflow's artifact: cross-workflow artifact access is brittle and
      # vitest on ubuntu finishes in under 30s, so re-running it in-place is
      # cheaper than the plumbing. ts-lint.yml still uploads its own copy of
      # ui/coverage/lcov.info as an artifact for humans who want to inspect.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        # --ignore-scripts: our deps (sass, vitest, jsdom, etc.) are pure JS
        # and don't need pre/post-install scripts; skipping them closes the
        # arbitrary-code-execution surface flagged by Sonar rule S6505.
        run: npm ci --ignore-scripts

      # vitest's v8 provider skips writing coverage/lcov.info entirely when
      # zero test files exist (passWithNoTests). The `|| ... : > lcov.info`
      # fallback guarantees Sonar has a path to read at
      # sonar.javascript.lcov.reportPaths; empty lcov parses as "no data".
      - name: Run UI tests with coverage
        working-directory: ui
        run: |
          npm run test:coverage
          [ -f coverage/lcov.info ] || { mkdir -p coverage && : > coverage/lcov.info; }

      - uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  codecov:
    name: Codecov upload
    needs: [agent-test, server-test]
    # Same exclusion logic as sonarcloud: Dependabot PRs cannot read repo
    # secrets, so a CODECOV_TOKEN-gated upload would always fail. Coverage
    # files for dep bumps don't change project numbers in any meaningful way,
    # so skipping the upload loses no signal.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      # OIDC tokenless upload for public repos (codecov-action v5+); avoids
      # the chicken-and-egg of requiring CODECOV_TOKEN before the first
      # workflow run that would seed it.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Codecov reads git history to attribute coverage to commits;
          # shallow clones drop blame data the dashboard expects.
          fetch-depth: 0
          persist-credentials: false

      - name: Download agent coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-agent

      - name: Download server coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-server

      # UI coverage is generated inline for the same reason it is in the
      # sonarcloud job above: cross-workflow artifact access is brittle and
      # vitest finishes in ~30s. The empty-lcov fallback handles the
      # zero-tests case (today UI has no `.test.*` files; vitest's v8
      # provider skips lcov.info under passWithNoTests).
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci --ignore-scripts

      - name: Run UI tests with coverage
        working-directory: ui
        run: |
          npm run test:coverage
          [ -f coverage/lcov.info ] || { mkdir -p coverage && : > coverage/lcov.info; }

      # Three uploads, one per flag, so the Codecov dashboard separates
      # agent / server / ui trends. codecov-action's `flags` input is
      # single-string per invocation; the documented multi-flag pattern is
      # multiple action calls.
      - name: Upload agent coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage-agent.out
          flags: agent
          use_oidc: true
          fail_ci_if_error: false

      - name: Upload server coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage-server.out
          flags: server
          use_oidc: true
          fail_ci_if_error: false

      - name: Upload UI coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: ui/coverage/lcov.info
          flags: ui
          use_oidc: true
          fail_ci_if_error: false
