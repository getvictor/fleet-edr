name: Tests

# Gate-then-analyze pattern: a single `changes` job inspects the PR's file
# list and emits one boolean per language plus an `any` summary. Each test
# job is skipped via `if:` when its files weren't touched, so a doc-only PR
# pays nothing here, and a Go-only PR doesn't wait on UI tests (or vice
# versa). Sonar + Codecov still run for any-source PRs and tolerate missing
# coverage artifacts when their producing job was skipped. A skipped
# required check is treated as success by branch protection, so the gate
# names (`Agent tests`, `Server tests`, `UI tests`, `SonarCloud scan`,
# `Codecov upload`) can stay in `required_status_checks` unchanged. Pushes
# to main and workflow_dispatch always run everything.
#
# Failsafe: every dependent job's `if:` evaluates `needs.changes.result !=
# 'success' || <relevant flag>`. If the `changes` job itself flakes (e.g.
# transient gh API failure), test jobs run unconditionally rather than
# skipping — without the failsafe, a flaky gate would let a PR merge with
# no test execution because skipped required checks are treated as success.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Top-level token has no permissions; each job grants the exact scopes it
# needs (satisfies Scorecard Token-Permissions, Sonar githubactions:S8264,
# zizmor excessive-permissions).
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect language changes
    runs-on: ubuntu-latest
    permissions:
      contents: read       # baseline; the detect step doesn't actually checkout
      pull-requests: read  # gate job reads the PR's file list via gh api pulls/<n>/files
    outputs:
      go: ${{ steps.detect.outputs.go }}
      ui: ${{ steps.detect.outputs.ui }}
      any: ${{ steps.detect.outputs.any }}
    steps:
      - id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            {
              echo "go=true"
              echo "ui=true"
              echo "any=true"
            } >> "$GITHUB_OUTPUT"
            echo "Triggered by $EVENT_NAME; running all test jobs."
            exit 0
          fi
          files=$(gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/files" --jq '.[].filename')
          # Taskfile.yml + this workflow file fan out to both language gates
          # because either could change how any test job runs. The "any extra"
          # pattern catches changes that should still trigger Sonar/Codecov
          # even when no language gate fires (e.g. sonar-project.properties).
          GO_PATTERN='\.go$|(^|/)go\.(mod|sum)$|^Taskfile\.yml$|^\.github/workflows/test\.yml$'
          UI_PATTERN='^ui/|^Taskfile\.yml$|^\.github/workflows/test\.yml$'
          ANY_EXTRA_PATTERN='^sonar-project\.properties$|^\.github/workflows/test\.yml$'
          go=false; ui=false; any=false
          if echo "$files" | grep -qE "$GO_PATTERN"; then
            go=true; any=true
            echo "go relevant; will run Go test jobs."
          else
            echo "go not touched; skipping Go test jobs."
          fi
          if echo "$files" | grep -qE "$UI_PATTERN"; then
            ui=true; any=true
            echo "ui relevant; will run UI test job."
          else
            echo "ui not touched; skipping UI test job."
          fi
          if echo "$files" | grep -qE "$ANY_EXTRA_PATTERN"; then
            any=true
            echo "Sonar/Codecov-relevant non-language file changed."
          fi
          {
            echo "go=$go"
            echo "ui=$ui"
            echo "any=$any"
          } >> "$GITHUB_OUTPUT"

  # agent-test runs on macos-latest because the agent's CGo receiver links
  # -framework Foundation with no darwin build tag, so it won't build on
  # ubuntu. server-test runs on ubuntu-latest with a mysql service container
  # — server/ has zero darwin build tags so the platform is free, and ubuntu
  # is ~10x cheaper minutes plus skips the 45s brew-install MySQL step.
  # Coverage is collected here (not re-run in the Sonar job) to avoid
  # duplicate Go test runs.
  agent-test:
    name: Agent tests
    needs: changes
    if: >-
      !cancelled()
      && (needs.changes.result != 'success' || needs.changes.outputs.go == 'true')
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.50.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run agent tests with coverage
        run: task test:go:agent:coverage

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-agent
          path: coverage-agent.out
          if-no-files-found: error
          retention-days: 1

  server-test:
    name: Server tests
    needs: changes
    if: >-
      !cancelled()
      && (needs.changes.result != 'success' || needs.changes.outputs.go == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      EDR_TEST_DSN: "root:@tcp(127.0.0.1:3306)/edr_test?parseTime=true"
    # Service container avoids the 45s brew-install MySQL dance the macos
    # runner used to pay. The image starts in parallel with checkout/setup-go
    # and is health-checked before the first step runs. Empty root password
    # matches the local docker-compose dev/test posture (see CLAUDE.md).
    services:
      mysql:
        image: mysql:8.4@sha256:c36050afdca850f23cef85703f84c7531a5ae155a11b5ee1c60acb09937c4084
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: edr_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Create UI dist placeholder for embed
        run: mkdir -p server/ui/dist && touch server/ui/dist/.gitkeep

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.50.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Raise MySQL's max_connections above the 151 default. With t.Parallel() across the
      # integration suite (issue #172) and `go test -p` fanning out one process per package,
      # peak in-flight connections crosses 200. Setting via SQL avoids needing a custom image
      # or a mounted my.cnf — the service container has no volume mount in GHA.
      - name: Raise MySQL max_connections
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -e "SET GLOBAL max_connections = 500"

      # test:go:server:coverage reads $EDR_TEST_DSN from the environment (set
      # above) and otherwise falls back to the docker-compose port used locally.
      - name: Run server tests with coverage
        run: task test:go:server:coverage

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-server
          path: coverage-server.out
          if-no-files-found: error
          retention-days: 1

  # Single source of test execution for the UI bundle. Uploads the
  # coverage-ui artifact that sonarcloud + codecov below consume.
  # ts-lint.yml owns lint + type-check; this job owns vitest.
  ui-test:
    name: UI tests
    needs: changes
    if: >-
      !cancelled()
      && (needs.changes.result != 'success' || needs.changes.outputs.ui == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.50.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install UI dependencies
        working-directory: ui
        # --ignore-scripts: our deps (sass, vitest, jsdom, etc.) are pure JS
        # and don't need pre/post-install scripts; skipping them closes the
        # arbitrary-code-execution surface flagged by Sonar rule S6505.
        run: npm ci --ignore-scripts

      # task test:ui:coverage runs vitest + writes ui/coverage/lcov.info,
      # falling back to an empty lcov when zero tests exist (vitest's v8
      # provider skips the write under passWithNoTests). Sonar/Codecov
      # both treat empty lcov as "no data" rather than an error.
      - name: Run UI tests with coverage
        run: task test:ui:coverage

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-ui
          path: ui/coverage/lcov.info
          # Empty lcov.info is allowed (zero tests case); Sonar/Codecov
          # tolerate empty input. Keep error here so a missing file still
          # signals a real upload-step failure.
          if-no-files-found: error
          retention-days: 1

  # End-to-end Playwright coverage. Boots an instrumented (`go build
  # -cover`) server binary against mysql + dex, runs the full
  # Playwright suite across five phases (each with its own env so
  # the env-specific QA sections — A.6 allowlist, A.7 rate limit,
  # B.3 JIT off, E.1+E.4+E.5 session lifecycle — actually exercise
  # their server-side gates), drains GOCOVERDIR via `go tool covdata
  # textfmt` into coverage-server-e2e.out, and merges per-test V8
  # coverage payloads into test/e2e/coverage/lcov-e2e.info via
  # monocart-coverage-reports. Both artifacts feed Sonar + Codecov
  # below as extra report paths, so a line touched only by an E2E
  # run still counts toward the "Coverage on New Code" gate.
  #
  # The orchestration script (scripts/test-e2e-coverage.sh) restarts
  # the covered binary between phases so each phase starts with a
  # clean in-memory rate-limit bucket (no `npm test:all`-style 90s
  # sleep needed). All phases share GOCOVERDIR; covdata textfmt
  # merges the per-PID profiles at the end. Phase 5 (session
  # lifecycle) overrides EDR_SESSION_*_TIMEOUT to 5s/3s so the
  # idle-eviction waits land in seconds rather than the local 18s+11s
  # defaults.
  e2e-test:
    name: E2E tests with coverage
    needs: changes
    if: >-
      !cancelled()
      && (needs.changes.result != 'success' || needs.changes.outputs.any == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # No top-level env block — scripts/test-e2e-coverage.sh sets the
    # full EDR_* env explicitly per phase (COMMON_ENV array + phase
    # overrides) so each server boot exercises exactly the env that
    # phase's specs assert against. Anything declared here would
    # leak across all phases and break the env-specific assertions.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            ui/package-lock.json
            test/e2e/package-lock.json

      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.50.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Boot mysql + dex
        run: task qa:up

      - name: Build UI bundle with source maps
        # UI_BUILD_SOURCEMAP=1 (via task build:ui:e2e) emits the
        # production-shape minified bundle alongside the .map files
        # monocart-coverage-reports needs to remap V8 coverage back
        # to ui/src/**. Regular `task build:ui` strips source maps
        # for production lean-ness; the e2e job's bundle is throw-
        # away so the extra .map files are fine.
        run: task build:ui:e2e

      - name: Install Playwright + Chromium
        working-directory: test/e2e
        # `npm ci --ignore-scripts` matches the UI install step; the
        # second line invokes the LOCALLY installed playwright via
        # node_modules/.bin (not `npx`, which Sonar flags because the
        # implicit registry-fetch surface is a SAST concern even when
        # the binary already exists locally).
        run: |
          npm ci --ignore-scripts
          ./node_modules/.bin/playwright install --with-deps chromium

      - name: Run E2E coverage pipeline (5 phases)
        # task test:e2e:coverage delegates to scripts/test-e2e-coverage.sh,
        # which builds the `-cover` binary once, then walks five phases:
        #   1. default-env-auth        (auth specs)
        #   2. default-env-qa          (A.5 + C/D/F.4)
        #   3. default-env-a7          (A.7 rate-limit; isolated so its
        #                               per-IP bucket burn doesn't bleed)
        #   4. envspec-allowlist-jit-off (A.6 + B.3 in one server boot)
        #   5. short-session-timeouts  (E.1+E.4+E.5 with idle=5s/3s)
        # All phases share GOCOVERDIR; covdata textfmt merges + the
        # monocart converter aggregates V8 payloads from coverage-raw/.
        run: task test:e2e:coverage

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-server-e2e
          path: coverage-server-e2e.out
          if-no-files-found: error
          retention-days: 1

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-ui-e2e
          path: test/e2e/coverage/lcov-e2e.info
          # Empty lcov tolerated: a future code path that exercises no
          # UI (pure server tests) would produce an empty file. Sonar
          # and Codecov both accept empty LCOV.
          if-no-files-found: warn
          retention-days: 1

      - name: Upload per-phase server logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-server-logs
          # The orchestration script writes one log file per phase
          # under tmp/e2e-server-logs/ so a failing phase points at
          # exactly the server instance whose env it was driving.
          path: tmp/e2e-server-logs/
          if-no-files-found: ignore
          retention-days: 7

  sonarcloud:
    name: SonarCloud scan
    needs: [changes, agent-test, server-test, ui-test, e2e-test]
    # `!cancelled()` overrides the default `success()` precondition so this
    # job still runs when one of the upstream test jobs was *skipped* (e.g.
    # a Go-only PR that skipped ui-test). The explicit `!= 'failure'` checks
    # preserve the prior behavior of "don't run Sonar on top of a failing
    # test" — the test failure already blocks merge on its own.
    #
    # Dependabot-triggered PR runs cannot access Actions secrets (deliberate
    # GitHub policy: prevents a compromised upstream action from stealing
    # SONAR_TOKEN via a dep bump). Without the token the scanner can't reach a
    # private project, so it's guaranteed to fail. The bumps also don't touch
    # any source Sonar analyses, so skipping it loses zero signal.
    if: >-
      !cancelled()
      && (needs.changes.result != 'success' || needs.changes.outputs.any == 'true')
      && needs.agent-test.result != 'failure'
      && needs.server-test.result != 'failure'
      && needs.ui-test.result != 'failure'
      && needs.e2e-test.result != 'failure'
      && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    environment: sonarcloud
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Shallow clones disable Sonar blame assignment; keep full history.
          fetch-depth: 0
          persist-credentials: false

      # Each coverage download is gated on its producing job actually
      # running. Skipped producers (UI-only PR skips Go tests, etc.) don't
      # publish artifacts, so an unconditional download would 404. Sonar
      # tolerates missing inputs and reports 0% for whichever language
      # didn't run — but since the gate evaluates new-code coverage only,
      # a PR that didn't touch that language has no new lines to cover.
      - name: Download agent coverage
        if: needs.agent-test.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-agent

      - name: Download server coverage
        if: needs.server-test.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-server

      # ui-test job uploads coverage-ui (ui/coverage/lcov.info). Sonar's
      # sonar.javascript.lcov.reportPaths in sonar-project.properties expects
      # the file at that exact path, so re-create the directory layout.
      - name: Download UI coverage
        if: needs.ui-test.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-ui
          path: ui/coverage

      # e2e-test job uploads coverage-server-e2e (Go) and
      # coverage-ui-e2e (LCOV). sonar.go.coverage.reportPaths +
      # sonar.javascript.lcov.reportPaths in sonar-project.properties
      # point at coverage-server-e2e.out (repo root) and
      # test/e2e/coverage/lcov-e2e.info respectively, so re-create
      # those exact paths in the download targets.
      - name: Download server E2E coverage
        if: needs.e2e-test.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-server-e2e

      - name: Download UI E2E coverage
        if: needs.e2e-test.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-ui-e2e
          path: test/e2e/coverage

      - uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  codecov:
    name: Codecov upload
    needs: [changes, agent-test, server-test, e2e-test]
    # Codecov only consumes the agent + server flags (codecov.yml ignores
    # ui/src/** globally — see comment further down), so this job is
    # Go-relevant only: a UI-only PR skips it. Same `!cancelled()` +
    # explicit failure check pattern as sonarcloud above.
    #
    # Same Dependabot exclusion as sonarcloud: Dependabot PRs cannot read
    # repo secrets, so a CODECOV_TOKEN-gated upload would always fail.
    # Coverage files for dep bumps don't change project numbers in any
    # meaningful way, so skipping the upload loses no signal.
    if: >-
      !cancelled()
      && (needs.changes.result != 'success' || needs.changes.outputs.any == 'true')
      && needs.agent-test.result != 'failure'
      && needs.server-test.result != 'failure'
      && needs.e2e-test.result != 'failure'
      && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    # CODECOV_TOKEN lives in the `codecov` environment so branch-protection
    # policies can constrain which refs can read it (same pattern as the
    # `sonarcloud` and `release-signing` environments).
    environment: codecov
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Codecov reads git history to attribute coverage to commits;
          # shallow clones drop blame data the dashboard expects.
          fetch-depth: 0
          persist-credentials: false

      # Each download gated on its producing job actually running.
      # The job's `if:` widened from `outputs.go == true` to
      # `outputs.any == true` (so a UI-only PR's E2E coverage still
      # uploads), which means agent/server downloads can no longer
      # assume their producers ran. download-artifact 404s on missing
      # artifacts; gating prevents that breakage on non-Go PRs.
      - name: Download agent coverage
        if: needs.agent-test.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-agent

      - name: Download server coverage
        if: needs.server-test.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-server

      - name: Download server E2E coverage
        if: needs.e2e-test.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-server-e2e

      - name: Download UI E2E coverage
        if: needs.e2e-test.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-ui-e2e
          path: test/e2e/coverage

      # disable_search: true -- codecov-action otherwise auto-searches
      # the workspace for *.out / lcov.info files in addition to the
      # explicit `files:` argument, so a stray coverage file landing in
      # the repo would silently get double-counted under whichever flag
      # was uploaded next. Be explicit; don't trust auto-discovery.
      - name: Upload agent coverage
        if: needs.agent-test.result == 'success'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage-agent.out
          flags: agent
          disable_search: true
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload server coverage
        if: needs.server-test.result == 'success'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage-server.out
          flags: server
          disable_search: true
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      # E2E coverage uploads: same `server` flag merges this profile
      # with the unit-test server coverage (Codecov takes the union
      # per flag). The UI E2E LCOV uploads under a separate `ui` flag
      # because no vitest tests exist yet — when they land they'll
      # upload to the same flag and the union still holds.
      - name: Upload server E2E coverage
        if: needs.e2e-test.result == 'success'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage-server-e2e.out
          flags: server
          disable_search: true
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload UI E2E coverage
        if: needs.e2e-test.result == 'success'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
