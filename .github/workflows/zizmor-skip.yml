# Sentinel workflow for the `zizmor` required status check.
#
# Branch protection requires the `zizmor` check to pass on every PR, but the
# real zizmor workflow only runs when workflow files change (via `paths:`).
# For PRs that don't touch workflow files, this workflow fires instead and
# reports the same `zizmor` check name as success, so merges are not blocked.
#
# The real workflow is `zizmor.yml`. Keep the `paths:` lists in both files in
# sync: matching paths run real zizmor, non-matching paths run this sentinel.

name: GitHub Actions security (skip)

on:
  push:
    branches: [main]
    paths-ignore:
      - ".github/workflows/**"
      - ".github/actions/**/action.yml"
      - ".github/actions/**/action.yaml"
  pull_request:
    paths-ignore:
      - ".github/workflows/**"
      - ".github/actions/**/action.yml"
      - ".github/actions/**/action.yaml"

permissions: {}

concurrency:
  group: zizmor-skip-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - run: echo "No workflow files changed; zizmor not needed."
