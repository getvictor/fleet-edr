name: OpenAPI lint

on:
  push:
    branches: [main]
    paths:
      - "docs/api/openapi.yaml"
      - ".github/workflows/openapi-lint.yml"
  pull_request:
    paths:
      - "docs/api/openapi.yaml"
      - ".github/workflows/openapi-lint.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: redocly lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      # `--ignore-scripts` blocks any postinstall hook in @redocly/cli or its
      # transitive deps from running on the runner — closes Sonar
      # githubactions:S6505 ("supply-chain hook execution"). The lint CLI
      # itself only reads the OpenAPI YAML; it has no legitimate need for
      # install-time scripts to fire.
      - name: Run redocly lint
        run: npx --ignore-scripts -y @redocly/cli@2.29.2 lint docs/api/openapi.yaml
