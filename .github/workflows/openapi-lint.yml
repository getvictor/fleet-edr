name: OpenAPI lint

on:
  push:
    branches: [main]
    paths:
      - "docs/api/openapi.yaml"
      - ".github/workflows/openapi-lint.yml"
  pull_request:
    paths:
      - "docs/api/openapi.yaml"
      - ".github/workflows/openapi-lint.yml"
  workflow_dispatch:

# Top-level token has no permissions; each job grants the exact scopes it
# needs (satisfies Scorecard Token-Permissions, Sonar githubactions:S8264,
# zizmor excessive-permissions).
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: redocly lint
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      # `--ignore-scripts` blocks any postinstall hook in @redocly/cli or its
      # transitive deps from running on the runner. This closes Sonar
      # githubactions:S6505 ("supply-chain hook execution"). The lint CLI
      # itself only reads the OpenAPI YAML; it has no legitimate need for
      # install-time scripts to fire.
      - name: Run redocly lint
        run: npx --ignore-scripts -y @redocly/cli@2.29.2 lint docs/api/openapi.yaml
