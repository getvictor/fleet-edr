name: OpenSpec validate

# Runs `openspec validate --all --strict` so a structurally malformed spec or change delta fails the PR instead of
# landing silently in openspec/specs. This caught observability-instrumentation, whose "DB client metrics" requirement
# shipped with zero scenarios: openspec validate flags that (a requirement MUST have at least one scenario), while
# spectrace could not, since spectrace counts scenarios and a zero-scenario requirement contributes none to count.
#
# This complements the other two OpenSpec gates rather than overlapping them:
#   - OpenSpec sync (openspec-sync.yml): enforces that a behavior change touches openspec/ at all.
#   - spectrace (spectrace.yml): ties each normative scenario to a test marker.
#   - this gate: enforces that the spec/delta documents are themselves structurally valid.
#
# Runs unconditionally on every PR (validation is a couple of seconds and needs no repo deps), so the check never
# skips and can be a required status check without the skipped-required-check trap.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: OpenSpec validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Validate all OpenSpec specs and changes (strict)
        # --ignore-scripts: npx fetches @fission-ai/openspec at run time; skip the package's install lifecycle scripts so a
        # compromised dependency can't run arbitrary code in CI (Sonar githubactions:S6505). openspec is pure JS with no
        # required postinstall, so the CLI still works.
        run: npx --ignore-scripts -y @fission-ai/openspec@1.3.1 validate --all --strict
