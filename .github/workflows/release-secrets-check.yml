name: release secrets check

# Validates that the `release-signing` GitHub Environment is wired correctly
# end-to-end without running a real release:
#
#   1. Imports the two Developer ID .p12 files into a temp keychain.
#   2. Asserts both Developer ID identities show up under the configured Team ID.
#   3. Exercises notarytool auth with `notarytool history --limit 1` so Apple's
#      notary service confirms the (apple-id, team-id, app-password) triple
#      without queueing anything.
#   4. CMS-signs a scratch plist with the Developer ID Installer key to prove
#      the private key is usable (the same key productsign uses on the pkg).
#      Release .mobileconfig profiles ship unsigned, so no release artifact
#      is signed here.
#   5. Tears down the temp keychain.
#
# Manual-only trigger. Reference the same `release-signing` environment the
# real release.yml uses so required-reviewer gates kick in here too. If this
# job passes, a subsequent `v*` tag push has a strong guarantee that signing
# + notarization won't fail on credential issues.

on:
  workflow_dispatch: {}

# Top-level token has no permissions; each job grants the exact scopes it
# needs (satisfies Scorecard Token-Permissions, Sonar githubactions:S8264,
# zizmor excessive-permissions).
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify release-signing secrets
    runs-on: macos-15  # pin: matches release workflow; ensures reproducible signing
    environment: release-signing
    permissions:
      # Read-only: this workflow never writes to the repo or any external system.
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Import signing identities
        env:
          APPLE_DEV_ID_APP_P12_BASE64: ${{ secrets.APPLE_DEV_ID_APP_P12_BASE64 }}
          APPLE_DEV_ID_APP_P12_PASSWORD: ${{ secrets.APPLE_DEV_ID_APP_P12_PASSWORD }}
          APPLE_DEV_ID_INSTALLER_P12_BASE64: ${{ secrets.APPLE_DEV_ID_INSTALLER_P12_BASE64 }}
          APPLE_DEV_ID_INSTALLER_P12_PASSWORD: ${{ secrets.APPLE_DEV_ID_INSTALLER_P12_PASSWORD }}
        run: ./packaging/pkg/ci-setup.sh

      - name: Assert both Developer ID identities are present under the expected team
        env:
          EXPECTED_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -eu
          if [ -z "${CI_KEYCHAIN:-}" ]; then
            echo "CI_KEYCHAIN not set - ci-setup.sh did not export to GITHUB_ENV." >&2
            exit 1
          fi
          APP=$(/usr/bin/security find-identity -p codesigning -v "$CI_KEYCHAIN" \
              | grep "Developer ID Application.*(${EXPECTED_TEAM_ID})" || true)
          INSTALLER=$(/usr/bin/security find-identity -p basic -v "$CI_KEYCHAIN" \
              | grep "Developer ID Installer.*(${EXPECTED_TEAM_ID})" || true)
          if [ -z "$APP" ]; then
            echo "missing Developer ID Application identity for team ${EXPECTED_TEAM_ID}" >&2
            exit 1
          fi
          if [ -z "$INSTALLER" ]; then
            echo "missing Developer ID Installer identity for team ${EXPECTED_TEAM_ID}" >&2
            exit 1
          fi
          echo "App identity:        $APP"
          echo "Installer identity:  $INSTALLER"

      - name: Verify notarytool credentials (no submission)
        env:
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
        # `notarytool history --limit 1` hits Apple's notary service with the
        # supplied creds and returns either the most recent submission or an
        # empty list - both are success signals that auth works. Bad
        # creds fail with "Error: HTTP status code: 401. Unable to authenticate".
        run: |
          /usr/bin/xcrun notarytool history \
              --apple-id "$APPLE_NOTARY_APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_NOTARY_APP_PASSWORD" \
              --output-format json | head -40

      - name: Exercise the Developer ID Installer private key (scratch CMS sign)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        # The released .mobileconfig profiles ship unsigned (MDM channels sign
        # them at delivery), so there is no profile-signing step to rehearse.
        # The Installer private key still signs the pkg via productsign in
        # build.sh; CMS-sign a throwaway plist with it to catch cert/key
        # misalignment now rather than at the first release cut.
        run: |
          set -eu
          SCRATCH="${RUNNER_TEMP:-/tmp}/scratch.plist"
          printf '<?xml version="1.0" encoding="UTF-8"?>\n<plist version="1.0"><dict/></plist>\n' > "$SCRATCH"
          /usr/bin/security cms -S -N "Developer ID Installer: VICTOR LYUBOSLAVSKY ($APPLE_TEAM_ID)" \
              -k "$CI_KEYCHAIN" -i "$SCRATCH" -o "$SCRATCH.signed"
          /usr/bin/security cms -D -i "$SCRATCH.signed" > /dev/null
          echo "Installer private key signs OK"

      - name: Teardown keychain
        if: always()
        run: |
          if [ -n "${CI_KEYCHAIN:-}" ]; then
            /usr/bin/security delete-keychain "$CI_KEYCHAIN" || true
          fi
