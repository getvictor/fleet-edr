name: Go test

on:
  push:
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "Taskfile.yml"
      - ".github/workflows/go-test.yml"
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "Taskfile.yml"
      - ".github/workflows/go-test.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The agent job doesn't need MySQL but needs macOS for CGo / ESF build tags.
  # The server job needs MySQL 8.4 but runs faster on ubuntu. Both invoke the
  # same Taskfile target (test:go) so the flags (-race -count=1 -timeout=10m)
  # stay consistent between local dev and CI.
  agent-test:
    name: Agent tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: arduino/setup-task@24c5e13bce349197642746563945fcdf9355e8f4 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Agent tests don't touch MySQL but test:go still runs the full suite
      # (which is OK because the server tests gracefully no-op when
      # EDR_TEST_DSN can't open a connection). Scope to agent + internal only
      # on this runner.
      - name: Run agent tests
        run: go test -race -count=1 -timeout=10m ./agent/... ./internal/...

  server-test:
    name: Server tests
    runs-on: macos-latest
    env:
      EDR_TEST_DSN: "root:@tcp(127.0.0.1:3306)/edr_test?parseTime=true"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Create UI dist placeholder for embed
        run: mkdir -p server/ui/dist && touch server/ui/dist/.gitkeep

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: arduino/setup-task@24c5e13bce349197642746563945fcdf9355e8f4 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install MySQL 8.4
        run: brew install mysql@8.4

      - name: Initialize and start MySQL
        run: |
          MYSQL_PREFIX="$(brew --prefix mysql@8.4)"
          echo "${MYSQL_PREFIX}/bin" >> "$GITHUB_PATH"
          "${MYSQL_PREFIX}/bin/mysqld" --initialize-insecure --datadir="${MYSQL_PREFIX}/data"
          "${MYSQL_PREFIX}/bin/mysqld_safe" --datadir="${MYSQL_PREFIX}/data" &

      - name: Wait for MySQL
        timeout-minutes: 2
        run: |
          MYSQL_PREFIX="$(brew --prefix mysql@8.4)"
          for i in $(seq 1 60); do
            if "${MYSQL_PREFIX}/bin/mysqladmin" ping --silent 2>/dev/null; then
              echo "MySQL is ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "MySQL failed to start"
          exit 1

      - name: Create test database
        run: |
          MYSQL_PREFIX="$(brew --prefix mysql@8.4)"
          "${MYSQL_PREFIX}/bin/mysql" -u root -e "CREATE DATABASE IF NOT EXISTS edr_test"

      # test:go reads $EDR_TEST_DSN from the environment (set above) and
      # otherwise falls back to the docker-compose port used locally. CI's DSN
      # wins because the job-level `env:` is seen by Task's variable resolver.
      - name: Run server tests via Taskfile
        run: task test:go
