name: Pkg dry-run

# Exercise packaging/pkg/build.sh --dry-run on every PR that touches the
# packaging scaffolding. Catches shell-script regressions (bad flag, broken
# substitution, malformed distribution.xml) without needing Developer ID
# secrets. The real release workflow runs the same script path, so if this
# is green we have high confidence the release workflow will not blow up
# during signing.
#
# See go-lint.yml for the gate-then-analyze pattern rationale.

on:
  push:
    branches: [main]
    paths:
      - "packaging/**"
      - ".github/workflows/pkg-dryrun.yml"
  pull_request:
  workflow_dispatch: {}

# Top-level token has no permissions; each job grants the exact scopes it
# needs (satisfies Scorecard Token-Permissions, Sonar githubactions:S8264,
# zizmor excessive-permissions).
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect packaging changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read  # gate job reads the PR's file list via gh api pulls/<n>/files
    outputs:
      relevant: ${{ steps.detect.outputs.relevant }}
    steps:
      - id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          PATTERN='^packaging/|^agent/.*\.go$|^agent/go\.mod$|^agent/com\.fleetdm\.edr\.agent\.plist$|^\.github/workflows/pkg-dryrun\.yml$'
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "Triggered by $EVENT_NAME; running unconditionally."
            exit 0
          fi
          files=$(gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/files" --jq '.[].filename')
          if echo "$files" | grep -qE "$PATTERN"; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "Relevant changes:"
            echo "$files" | grep -E "$PATTERN"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "No relevant changes; skipping pkg dry-run."
          fi

  # spec:release-packaging/dry-run-build-on-any-macos-runner/pull-request-runs-the-dry-run
  #
  # This workflow IS the spec scenario's enforcement surface: the `on: pull_request` trigger above + the dryrun job below
  # exercise the full pkgbuild/productbuild flow on a stock macos-15 runner with zero signing secrets. A green dryrun job
  # on every PR catches packaging-script regressions before they reach release.yml.
  dryrun:
    name: Pkg build dry-run
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: macos-15  # pin: needs Xcode 16.3+ (project objectVersion 77)
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Xcode version
        # Log which Xcode the runner is using. The project's objectVersion is
        # 77 (Xcode 16.3+); a runner with only Xcode 15 will surface a clear
        # "future Xcode project file format" error rather than a cryptic one.
        run: xcodebuild -version

      - name: Prime Xcode Debug build (dry-run pkg reuses it)
        # Scheme `edr` (host app + embedded extensions), not `extension`
        # (sysext alone). build.sh --dry-run looks for
        # extension/edr/build/Debug/edr.app; route xcodebuild's output there
        # via CONFIGURATION_BUILD_DIR so both sides agree without DerivedData
        # path math.
        run: |
          xcodebuild \
            -project extension/edr/edr.xcodeproj \
            -scheme edr \
            -configuration Debug \
            -destination 'generic/platform=macOS' \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR="$GITHUB_WORKSPACE/extension/edr/build/Debug" \
            build

      # spec:release-packaging/dry-run-build-on-any-macos-runner/dry-run-does-not-contact-apple
      #
      # The --dry-run flag short-circuits build.sh's notarize + staple steps and uses ad-hoc signing (CODE_SIGN_IDENTITY=-)
      # so the script never invokes notarytool or stapler. The job also runs without any signing/notary credentials in env
      # (no APPLE_DEV_ID_*_P12_*, no APPLE_NOTARY_APP_PASSWORD), so even if a future regression re-introduced a notarize
      # call, it would fail-fast on missing credentials before reaching the network. Hosted runners DO have outbound
      # network access; the guarantee is "the dry-run path doesn't try to contact Apple", not "the runner is sandboxed
      # from the public internet".
      - name: Run pkg build dry-run
        env:
          APPLE_TEAM_ID: FDG8Q7N4CC
        run: ./packaging/pkg/build.sh v0.0.0-dryrun --dry-run

      - name: Render profiles
        env:
          APPLE_TEAM_ID: FDG8Q7N4CC
        run: ./packaging/profiles/render.sh

      - name: Shellcheck packaging scripts
        run: |
          brew install shellcheck
          shellcheck \
            packaging/pkg/build.sh \
            packaging/pkg/ci-setup.sh \
            packaging/pkg/uninstall.sh \
            packaging/pkg/scripts/preinstall \
            packaging/pkg/scripts/postinstall \
            packaging/profiles/render.sh

      - name: Summarize dry-run output
        # pkgutil --expand explodes each component pkg into a DIRECTORY (Bom +
        # PackageInfo + Payload + optional Scripts/), so the structural checks
        # below use `test -d` for component pkgs and look for scripts under
        # `agent.pkg/Scripts/` where `pkgbuild --scripts` places them.
        # The top-level Scripts/ path that `productbuild --scripts` would
        # produce is intentionally unused; see packaging/pkg/build.sh for
        # why that layout was abandoned (Installer.app never invoked those).
        run: |
          ls -la dist/
          pkgutil --expand dist/fleet-edr-*.pkg /tmp/expanded
          echo "=== pkg top level ==="
          ls /tmp/expanded/
          echo "=== three component pkgs present ==="
          test -d /tmp/expanded/agent.pkg && \
          test -d /tmp/expanded/app.pkg && \
          test -d /tmp/expanded/support.pkg && \
            echo OK
          echo "=== install scripts attached to agent.pkg ==="
          test -f /tmp/expanded/agent.pkg/Scripts/preinstall && \
          test -f /tmp/expanded/agent.pkg/Scripts/postinstall && \
            echo OK
          # spec:release-packaging/installation-activates-the-system-extensions/install-at-the-loginwindow-activates-at-next-login
          #
          # The activation LaunchAgent must ship in the app component: its RunAtLoad is the
          # only thing that activates the extensions on hosts installed at the loginwindow.
          # lsbom reads the component BOM without unpacking the payload.
          echo "=== activation LaunchAgent present in app.pkg ==="
          lsbom /tmp/expanded/app.pkg/Bom | grep -F "Library/LaunchAgents/com.fleetdm.edr.activate.plist" && \
            echo OK
