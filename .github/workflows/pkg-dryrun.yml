name: Pkg dry-run

# Exercise packaging/pkg/build.sh --dry-run on every PR that touches the
# packaging scaffolding. Catches shell-script regressions (bad flag, broken
# substitution, malformed distribution.xml) without needing Developer ID
# secrets. The real release workflow runs the same script path, so if this
# is green we have high confidence the release workflow will not blow up
# during signing.

on:
  pull_request:
    paths:
      - "packaging/**"
      - "agent/**/*.go"
      - "agent/go.mod"
      - "agent/com.fleetdm.edr.agent.plist"
      - ".github/workflows/pkg-dryrun.yml"
  push:
    branches: [main]
    paths:
      - "packaging/**"
      - ".github/workflows/pkg-dryrun.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dryrun:
    name: Pkg build dry-run
    runs-on: macos-15  # pin: needs Xcode 16.3+ (project objectVersion 77)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Xcode version
        # Log which Xcode the runner is using. The project's objectVersion is
        # 77 (Xcode 16.3+); a runner with only Xcode 15 will surface a clear
        # "future Xcode project file format" error rather than a cryptic one.
        run: xcodebuild -version

      - name: Prime Xcode Debug build (dry-run pkg reuses it)
        # Scheme `edr` (host app + embedded extensions), not `extension`
        # (sysext alone). build.sh --dry-run looks for
        # extension/edr/build/Debug/edr.app; route xcodebuild's output there
        # via CONFIGURATION_BUILD_DIR so both sides agree without DerivedData
        # path math.
        run: |
          xcodebuild \
            -project extension/edr/edr.xcodeproj \
            -scheme edr \
            -configuration Debug \
            -destination 'generic/platform=macOS' \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=${{ github.workspace }}/extension/edr/build/Debug \
            build

      - name: Run pkg build dry-run
        env:
          APPLE_TEAM_ID: FDG8Q7N4CC
        run: ./packaging/pkg/build.sh v0.0.0-dryrun --dry-run

      - name: Render profiles dry-run
        env:
          APPLE_TEAM_ID: FDG8Q7N4CC
        run: ./packaging/profiles/sign.sh --dry-run

      - name: Shellcheck packaging scripts
        run: |
          brew install shellcheck
          shellcheck \
            packaging/pkg/build.sh \
            packaging/pkg/ci-setup.sh \
            packaging/pkg/uninstall.sh \
            packaging/pkg/scripts/preinstall \
            packaging/pkg/scripts/postinstall \
            packaging/profiles/sign.sh

      - name: Summarize dry-run output
        # pkgutil --expand explodes each component pkg into a DIRECTORY (Bom +
        # PackageInfo + Payload + optional Scripts/), so the structural checks
        # below use `test -d` for component pkgs and look for scripts under
        # `agent.pkg/Scripts/` where `pkgbuild --scripts` places them.
        # The top-level Scripts/ path that `productbuild --scripts` would
        # produce is intentionally unused — see packaging/pkg/build.sh for
        # why that layout was abandoned (Installer.app never invoked those).
        run: |
          ls -la dist/
          pkgutil --expand dist/fleet-edr-*.pkg /tmp/expanded
          echo "=== pkg top level ==="
          ls /tmp/expanded/
          echo "=== three component pkgs present ==="
          test -d /tmp/expanded/agent.pkg && \
          test -d /tmp/expanded/app.pkg && \
          test -d /tmp/expanded/support.pkg && \
            echo OK
          echo "=== install scripts attached to agent.pkg ==="
          test -f /tmp/expanded/agent.pkg/Scripts/preinstall && \
          test -f /tmp/expanded/agent.pkg/Scripts/postinstall && \
            echo OK
