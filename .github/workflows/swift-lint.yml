name: Swift lint

on:
  push:
    branches: [main]
    paths:
      - "extension/**"
      - ".swiftlint.yml"
      - "Taskfile.yml"
      - ".github/workflows/swift-lint.yml"
  pull_request:
    paths:
      - "extension/**"
      - ".swiftlint.yml"
      - "Taskfile.yml"
      - ".github/workflows/swift-lint.yml"
  workflow_dispatch:

# Top-level token has no permissions; each job grants the exact scopes it
# needs (satisfies Scorecard Token-Permissions, Sonar githubactions:S8264,
# zizmor excessive-permissions).
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install SwiftLint
        run: brew install swiftlint

      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.50.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run SwiftLint via Taskfile
        run: task lint:swift
