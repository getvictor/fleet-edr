name: C lint

on:
  push:
    branches: [main]
    paths:
      - "agent/**/*.c"
      - "agent/**/*.h"
      - ".clang-tidy"
      - ".github/workflows/c-lint.yml"
  pull_request:
    paths:
      - "agent/**/*.c"
      - "agent/**/*.h"
      - ".clang-tidy"
      - ".github/workflows/c-lint.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-tidy:
    name: clang-tidy
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run clang-tidy
        run: find agent -name '*.c' -o -name '*.h' | xargs clang-tidy

      - name: Check formatting
        run: find agent -name '*.c' -o -name '*.h' | xargs clang-format --dry-run --Werror
