name: C lint

on:
  push:
    branches: [main]
    paths:
      - "agent/**/*.c"
      - "agent/**/*.h"
      - ".clang-tidy"
      - ".github/workflows/c-lint.yml"
  pull_request:
    paths:
      - "agent/**/*.c"
      - "agent/**/*.h"
      - ".clang-tidy"
      - ".github/workflows/c-lint.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-tidy:
    name: clang-tidy
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find C source files
        id: find-sources
        run: |
          files=$(find agent -name '*.c' -o -name '*.h')
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Run clang-tidy
        run: clang-tidy ${{ steps.find-sources.outputs.files }}

      - name: Check formatting
        run: clang-format --dry-run --Werror ${{ steps.find-sources.outputs.files }}
