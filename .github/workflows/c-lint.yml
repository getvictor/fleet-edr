name: C lint

on:
  push:
    branches: [main]
    paths:
      - "agent/**/*.c"
      - "agent/**/*.h"
      - ".clang-tidy"
      - ".clang-format"
      - "Taskfile.yml"
      - ".github/workflows/c-lint.yml"
  pull_request:
    paths:
      - "agent/**/*.c"
      - "agent/**/*.h"
      - ".clang-tidy"
      - ".clang-format"
      - "Taskfile.yml"
      - ".github/workflows/c-lint.yml"
  workflow_dispatch:

# Top-level token has no permissions; each job grants the exact scopes it
# needs (satisfies Scorecard Token-Permissions, Sonar githubactions:S8264,
# zizmor excessive-permissions).
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-tidy:
    name: clang-tidy + clang-format
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install LLVM
        run: brew install llvm

      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.50.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run clang-tidy + clang-format via Taskfile
        run: task lint:c
