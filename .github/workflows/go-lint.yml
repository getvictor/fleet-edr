name: Go lint

# Two-job gate-then-analyze pattern. The workflow always triggers; the
# `changes` job inspects the PR's file list and the analysis job is
# skipped via `if:` when no relevant files changed. A skipped required
# check is treated as success by branch protection, so this lets the
# main job stay in `required_status_checks` without making PRs that
# don't touch Go wait on a 1-2 minute lint run.

on:
  push:
    branches: [main]
    paths:
      - "**/*.go"
      - "**/go.mod"
      - "**/go.sum"
      - ".golangci.yml"
      - "Taskfile.yml"
      - ".github/workflows/go-lint.yml"
  pull_request:
  workflow_dispatch:

# Top-level token has no permissions; each job grants the exact scopes it
# needs (satisfies Scorecard Token-Permissions, Sonar githubactions:S8264,
# zizmor excessive-permissions).
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Go changes
    runs-on: ubuntu-latest
    permissions:
      contents: read       # baseline; the detect step doesn't actually checkout
      pull-requests: read  # gate job reads the PR's file list via gh api pulls/<n>/files
    outputs:
      relevant: ${{ steps.detect.outputs.relevant }}
    steps:
      - id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          PATTERN='\.go$|(^|/)go\.(mod|sum)$|^\.golangci\.yml$|^Taskfile\.yml$|^\.github/workflows/go-lint\.yml$'
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "Triggered by $EVENT_NAME; running unconditionally."
            exit 0
          fi
          files=$(gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/files" --jq '.[].filename')
          if echo "$files" | grep -qE "$PATTERN"; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "Relevant changes:"
            echo "$files" | grep -E "$PATTERN"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "No relevant changes; skipping golangci-lint."
          fi

  golangci-lint:
    name: golangci-lint
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    # macos-latest so the agent's CGo build tags (macOS-only Endpoint Security /
    # XPC bridge code) compile; ubuntu would fail on the CGo headers.
    runs-on: macos-latest
    permissions:
      contents: read  # checkout source
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Create UI dist placeholder for embed
        run: mkdir -p server/ui/dist && touch server/ui/dist/.gitkeep

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      # Install task so the CI entry point matches what developers run locally.
      # Keeps `task lint:go` as the single source of truth for how to invoke
      # golangci-lint across the project (paths, build tags, flags).
      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.50.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Install the pinned golangci-lint binary. `install-only: true` skips
      # the action's built-in `golangci-lint run` so we can first build the
      # custom binary (with the repo-local commentwrap plugin baked in) and
      # then delegate the actual invocation to Taskfile.
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11
          install-only: "true"

      # Cache the custom golangci-lint binary keyed on the plugin source
      # hash + the .custom-gcl.yml version pin. On a cache hit, the next
      # step's `task lint:install` short-circuits via Taskfile's sources
      # / generates rule (after `touch` resets the mtime so the rule
      # sees the restored binary as "newer than sources"). The build
      # itself is ~10-20s; the cache turns repeat lint runs into a
      # no-op for the binary build.
      #
      # NOTE: actions/cache SHA pin must be verified per the repo's
      # zizmor convention. Update SHA if a newer v4 release is preferred.
      - name: Cache custom golangci-lint binary
        id: cache-golangci-custom
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: tmp/golangci-lint-custom
          key: golangci-custom-${{ runner.os }}-${{ hashFiles('.custom-gcl.yml', 'tools/comment-wrap-check/lint/go.mod', 'tools/comment-wrap-check/lint/go.sum', 'tools/comment-wrap-check/lint/*.go') }}

      - name: Reset binary mtime on cache hit so Taskfile short-circuits
        if: steps.cache-golangci-custom.outputs.cache-hit == 'true'
        run: touch tmp/golangci-lint-custom

      # Build the custom golangci-lint binary at tmp/golangci-lint-custom.
      # It bakes in the commentwrap plugin from tools/comment-wrap-check/lint/
      # so `task lint:go` runs commentwrap alongside every other linter. The
      # upstream binary installed by the action above does NOT have this
      # plugin compiled in; the custom binary is what enforces issue #149's
      # wrap rule on every PR. A no-op when the cache hit above restored
      # the binary unchanged (Taskfile's sources / generates rule
      # short-circuits).
      - name: Build custom golangci-lint with commentwrap plugin
        run: task lint:install

      - name: Run golangci-lint via Taskfile
        run: task lint:go
