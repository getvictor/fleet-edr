name: Go lint

on:
  push:
    branches: [main]
    paths:
      - "agent/**"
      - "server/**"
      - ".golangci.yml"
      - ".github/workflows/go-lint.yml"
  pull_request:
    paths:
      - "agent/**"
      - "server/**"
      - ".golangci.yml"
      - ".github/workflows/go-lint.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - module: agent
            os: macos-latest
          - module: server
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Create UI dist placeholder for embed
        if: matrix.module == 'server'
        run: mkdir -p server/ui/dist && touch server/ui/dist/.gitkeep

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: ${{ matrix.module }}/go.mod

      - uses: golangci/golangci-lint-action@7119f3d5ddced62a10a044847a6c6bb0f7a5e76a # v7.0.0
        with:
          version: v2.11
          working-directory: ${{ matrix.module }}
