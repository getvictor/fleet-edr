name: Go lint

on:
  push:
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - "Taskfile.yml"
      - ".github/workflows/go-lint.yml"
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - "Taskfile.yml"
      - ".github/workflows/go-lint.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  golangci-lint:
    name: golangci-lint
    # macos-latest so the agent's CGo build tags (macOS-only Endpoint Security /
    # XPC bridge code) compile; ubuntu would fail on the CGo headers.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Create UI dist placeholder for embed
        run: mkdir -p server/ui/dist && touch server/ui/dist/.gitkeep

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      # Install task so the CI entry point matches what developers run locally.
      # Keeps `task lint:go` as the single source of truth for how to invoke
      # golangci-lint across the project (paths, build tags, flags).
      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Install + cache the pinned golangci-lint binary. `install-mode: goinstall`
      # is faster than the binary release for pinned versions on actionlint-cached
      # runners; `install-only: true` skips the action's built-in `golangci-lint
      # run` so we can delegate the actual invocation to Taskfile below.
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11
          install-only: "true"

      - name: Run golangci-lint via Taskfile
        run: task lint:go
