name: Go lint

on:
  push:
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - "Taskfile.yml"
      - ".github/workflows/go-lint.yml"
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - "Taskfile.yml"
      - ".github/workflows/go-lint.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  golangci-lint:
    name: golangci-lint
    # macos-latest so the agent's CGo build tags (macOS-only Endpoint Security /
    # XPC bridge code) compile; ubuntu would fail on the CGo headers.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Create UI dist placeholder for embed
        run: mkdir -p server/ui/dist && touch server/ui/dist/.gitkeep

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      # Install task so the CI entry point matches what developers run locally.
      # Keeps `task lint:go` as the single source of truth for how to invoke
      # golangci-lint across the project (paths, build tags, flags).
      - uses: arduino/setup-task@24c5e13bce349197642746563945fcdf9355e8f4 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Install + cache the pinned golangci-lint binary. Passing version-only
      # via `only-new-issues: false` and setting `args: version` makes the
      # action install the binary and exit; the actual run happens via Taskfile
      # below so the invocation matches `task lint:go` locally.
      - uses: golangci/golangci-lint-action@1481404843c368bc19ca9406f87d6e0fc97bdcfd # v7.0.0
        with:
          version: v2.11
          args: version
          install-mode: "binary"

      - name: Run golangci-lint via Taskfile
        run: task lint:go
