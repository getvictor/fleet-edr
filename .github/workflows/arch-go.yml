name: Arch lint

# arch-go enforces the modular-monolith bounded-context rules from
# arch-go.yml. Phase 6 strict mode: this is a hard-fail required check.

on:
  push:
    branches: [main]
    paths:
      - "**/*.go"
      - "**/go.mod"
      - "**/go.sum"
      - "arch-go.yml"
      - "Taskfile.yml"
      - ".github/workflows/arch-go.yml"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Go changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relevant: ${{ steps.detect.outputs.relevant }}
    steps:
      - id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          PATTERN='\.go$|(^|/)go\.(mod|sum)$|^arch-go\.yml$|^Taskfile\.yml$|^\.github/workflows/arch-go\.yml$'
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "Triggered by $EVENT_NAME; running unconditionally."
            exit 0
          fi
          files=$(gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/files" --jq '.[].filename')
          if echo "$files" | grep -qE "$PATTERN"; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "Relevant changes:"
            echo "$files" | grep -E "$PATTERN"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "No relevant changes; skipping arch-go."
          fi

  arch-go:
    name: arch-go
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    # macos-latest because the agent's CGo build tags require it; the
    # arch test loads the full module's package graph.
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Create UI dist placeholder for embed
        run: mkdir -p server/ui/dist && touch server/ui/dist/.gitkeep

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.50.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run arch-go via Taskfile
        run: task lint:arch
