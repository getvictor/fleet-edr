name: TypeScript lint

# See go-lint.yml for the gate-then-analyze pattern rationale.
#
# Test execution lives in test.yml's `ui-test` job, not here -- one place
# runs vitest with coverage and uploads the artifact that sonarcloud +
# codecov consume. This workflow is the lint gate; the test gate is
# `UI tests` in test.yml.

on:
  push:
    branches: [main]
    paths:
      - "ui/**"
      - "Taskfile.yml"
      - ".github/workflows/ts-lint.yml"
  pull_request:
  workflow_dispatch:

# Top-level token has no permissions; each job grants the exact scopes it
# needs (satisfies Scorecard Token-Permissions, Sonar githubactions:S8264,
# zizmor excessive-permissions).
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect TS changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read  # gate job reads the PR's file list via gh api pulls/<n>/files
    outputs:
      relevant: ${{ steps.detect.outputs.relevant }}
    steps:
      - id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          PATTERN='^ui/|^Taskfile\.yml$|^\.github/workflows/ts-lint\.yml$'
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "Triggered by $EVENT_NAME; running unconditionally."
            exit 0
          fi
          files=$(gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/files" --jq '.[].filename')
          if echo "$files" | grep -qE "$PATTERN"; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "Relevant changes:"
            echo "$files" | grep -E "$PATTERN"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "No relevant changes; skipping ts-lint."
          fi

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.50.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install UI dependencies
        working-directory: ui
        # --ignore-scripts: matches test.yml and closes the S6505 hotspot
        # surface; none of our UI deps need lifecycle scripts.
        run: npm ci --ignore-scripts

      - name: Lint + type-check via Taskfile
        run: task lint:ui
