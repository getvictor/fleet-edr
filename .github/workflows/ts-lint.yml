name: TypeScript lint and test

on:
  push:
    branches: [main]
    paths:
      - "ui/**"
      - "Taskfile.yml"
      - ".github/workflows/ts-lint.yml"
  pull_request:
    paths:
      - "ui/**"
      - "Taskfile.yml"
      - ".github/workflows/ts-lint.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install UI dependencies
        working-directory: ui
        # --ignore-scripts: matches test.yml and closes the S6505 hotspot
        # surface; none of our UI deps need lifecycle scripts.
        run: npm ci --ignore-scripts

      - name: Lint + type-check via Taskfile
        run: task lint:ui

      - name: Test + coverage via Taskfile
        run: task test:ui:coverage

      # Upload for inspection only; the Sonar scan job runs its own UI
      # coverage pass in-place (vitest finishes in <30s) rather than
      # reaching across workflow boundaries for the artifact.
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: ui-coverage
          path: ui/coverage/lcov.info
          if-no-files-found: ignore
          retention-days: 7
