name: TypeScript lint and test

# See go-lint.yml for the gate-then-analyze pattern rationale.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect TS changes
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.detect.outputs.relevant }}
    steps:
      - id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          PATTERN='^ui/|^Taskfile\.yml$|^\.github/workflows/ts-lint\.yml$'
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "Triggered by ${{ github.event_name }}; running unconditionally."
            exit 0
          fi
          files=$(gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/files" --jq '.[].filename')
          if echo "$files" | grep -qE "$PATTERN"; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "Relevant changes:"
            echo "$files" | grep -E "$PATTERN"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "No relevant changes; skipping ts-lint."
          fi

  lint-and-test:
    name: Lint and test
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.50.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install UI dependencies
        working-directory: ui
        # --ignore-scripts: matches test.yml and closes the S6505 hotspot
        # surface; none of our UI deps need lifecycle scripts.
        run: npm ci --ignore-scripts

      - name: Lint + type-check via Taskfile
        run: task lint:ui

      - name: Test + coverage via Taskfile
        run: task test:ui:coverage

      # Upload for inspection only; the Sonar scan job runs its own UI
      # coverage pass in-place (vitest finishes in <30s) rather than
      # reaching across workflow boundaries for the artifact.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: ui-coverage
          path: ui/coverage/lcov.info
          if-no-files-found: ignore
          retention-days: 7
