name: Go nilaway

# See go-lint.yml for the gate-then-analyze pattern rationale.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Go changes
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.detect.outputs.relevant }}
    steps:
      - id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          PATTERN='\.go$|^go\.(mod|sum)$|^\.github/workflows/go-nilaway\.yml$'
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "Triggered by ${{ github.event_name }}; running unconditionally."
            exit 0
          fi
          files=$(gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/files" --jq '.[].filename')
          if echo "$files" | grep -qE "$PATTERN"; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "Relevant changes:"
            echo "$files" | grep -E "$PATTERN"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "No relevant changes; skipping nilaway."
          fi

  # uber-go/nilaway does inter-procedural nil-dereference analysis that
  # staticcheck + govet -nilness miss because nilaway tracks nilability across
  # function boundaries. Gating check: every PR must stay at zero findings.
  # If nilaway flags something on a legitimate invariant (errors.As contract,
  # map-aliasing, a test that asserts-by-panicking), restructure the code so
  # the invariant is explicit (e.g. add require.NotNil / len-check) rather
  # than adding a global suppression.
  nilaway:
    name: nilaway
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Create UI dist placeholder for embed
        run: mkdir -p server/ui/dist && touch server/ui/dist/.gitkeep

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.50.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run nilaway
        run: task lint:nilaway
