name: Go nilaway

on:
  push:
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/go-nilaway.yml"
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/go-nilaway.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # uber-go/nilaway does inter-procedural nil-dereference analysis that
  # staticcheck + govet -nilness miss. The tool is intentionally aggressive and
  # produces false positives on patterns it cannot prove safe (errors.As
  # contracts, map-aliasing invariants, tests that skip nil checks on the
  # happy path). Job is deliberately non-gating (`continue-on-error: true`) so
  # findings are visible on the PR without blocking merges. Review periodically
  # via `task lint:nilaway` locally and fix real bugs.
  nilaway:
    name: nilaway (advisory)
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Create UI dist placeholder for embed
        run: mkdir -p server/ui/dist && touch server/ui/dist/.gitkeep

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run nilaway
        run: go tool nilaway -include-pkgs="github.com/fleetdm/edr" ./...
