version: 1

# Architecture rules for the modular-monolith bounded contexts.
# See docs/adr/0004-modular-monolith-bounded-contexts.md for the rationale.
#
# Strict mode: bootstrap is for production wiring only. Per-context
# internal code may NOT import its own context's bootstrap; tests reach
# for the per-context testkit instead. Cross-context tests import only
# **.<Y>.api or **.<Y>.testkit, never **.<Y>.bootstrap and never
# **.<Y>.internal.**. testkit packages are pinned to their own context
# so cross-context test allowances cannot be exploited as transitive
# paths to other bounded contexts.

dependenciesRules:
  # identity context internals may import only identity's own api +
  # internals + test-fixture surface, plus platform packages. Other
  # contexts that need identity functionality go through identity/api.
  - package: "**.identity.internal.**"
    shouldOnlyDependsOn:
      internal:
        - "**.identity.api"
        - "**.identity.api.**"
        - "**.identity.internal.**"
        - "**.identity.testkit"
        - "**.attrkeys"
        - "**.httpserver"
        - "**.testdb"

  # endpoint context internals.
  - package: "**.endpoint.internal.**"
    shouldOnlyDependsOn:
      internal:
        - "**.endpoint.api"
        - "**.endpoint.api.**"
        - "**.endpoint.internal.**"
        - "**.endpoint.testkit"
        - "**.attrkeys"
        - "**.httpserver"
        - "**.identity.api"  # identity.api.AuditRecorder for enrollment.revoke audit
        - "**.testdb"

  # rules context internals. Cross-context test allowance is
  # **.detection.testkit (and only testkit); a transitional
  # **.detection.bootstrap + **.detection.testharness pair existed in
  # earlier revisions and is no longer permitted.
  - package: "**.rules.internal.**"
    shouldOnlyDependsOn:
      internal:
        - "**.rules.api"
        - "**.rules.api.**"
        - "**.rules.internal.**"
        - "**.rules.testkit"
        - "**.attrkeys"
        - "**.httpserver"
        - "**.endpoint.api"
        - "**.identity.api"  # identity.api.AuditRecorder for policy.{create,update,delete} audit
        - "**.detection.api"
        - "**.detection.api.**"
        - "**.detection.testkit"
        - "**.testdb"

  # response context internals.
  - package: "**.response.internal.**"
    shouldOnlyDependsOn:
      internal:
        - "**.response.api"
        - "**.response.api.**"
        - "**.response.internal.**"
        - "**.response.testkit"
        - "**.attrkeys"
        - "**.httpserver"
        - "**.endpoint.api"
        - "**.identity.api"
        - "**.sqlhelpers"
        - "**.testdb"

  # detection context internals.
  - package: "**.detection.internal.**"
    shouldOnlyDependsOn:
      internal:
        - "**.detection.api"
        - "**.detection.api.**"
        - "**.detection.internal.**"
        - "**.detection.testkit"
        - "**.attrkeys"
        - "**.httpserver"
        - "**.endpoint.api"
        - "**.identity.api"
        - "**.rules.api"
        - "**.sqlhelpers"
        - "**.coordination.leader"  # MySQL-advisory-lock leader coordinator: pipeline.Runner gates retention + process-TTL on it
        - "**.testdb"

  # ----- testkit packages -----------------------------------------------------
  #
  # testkit is a curated test-fixture surface for each bounded context.
  # Pinning its dependencies to its own context (plus platform) prevents
  # cross-context tests from using testkit as a transitive sneak-in
  # path to a third context: even though rules.internal is allowed to
  # import detection.testkit, detection.testkit cannot pull in
  # identity/endpoint/response. arch-go inspects direct imports only,
  # so this defence-in-depth rule is what makes the layered allow-list
  # actually airtight.

  - package: "**.identity.testkit"
    shouldOnlyDependsOn:
      internal:
        - "**.identity.api"
        - "**.identity.api.**"
        - "**.identity.bootstrap"     # testkit.ApplySchema wraps bootstrap.ApplySchema
        - "**.identity.internal.**"
        - "**.attrkeys"
        - "**.httpserver"
        - "**.sqlhelpers"
        - "**.testdb"

  - package: "**.endpoint.testkit"
    shouldOnlyDependsOn:
      internal:
        - "**.endpoint.api"
        - "**.endpoint.api.**"
        - "**.endpoint.bootstrap"
        - "**.endpoint.internal.**"
        - "**.attrkeys"
        - "**.httpserver"
        - "**.sqlhelpers"
        - "**.testdb"

  - package: "**.rules.testkit"
    shouldOnlyDependsOn:
      internal:
        - "**.rules.api"
        - "**.rules.api.**"
        - "**.rules.bootstrap"
        - "**.rules.internal.**"
        - "**.attrkeys"
        - "**.httpserver"
        - "**.sqlhelpers"
        - "**.testdb"

  - package: "**.response.testkit"
    shouldOnlyDependsOn:
      internal:
        - "**.response.api"
        - "**.response.api.**"
        - "**.response.bootstrap"
        - "**.response.internal.**"
        - "**.attrkeys"
        - "**.httpserver"
        - "**.sqlhelpers"
        - "**.testdb"

  - package: "**.detection.testkit"
    shouldOnlyDependsOn:
      internal:
        - "**.detection.api"
        - "**.detection.api.**"
        - "**.detection.bootstrap"
        - "**.detection.internal.**"
        - "**.rules.api"              # Replay runs rulesapi.Rule against fixtures
        - "**.attrkeys"
        - "**.httpserver"
        - "**.sqlhelpers"
        - "**.testdb"

  # ----- api/ packages: pure-types, no cross-context internals ----------------
  #
  # Each <X>/api/ contains domain value types + interface declarations; any
  # executable cross-context wiring belongs in bootstrap/ or internal/. The
  # rule catches accidents like "rules.api gained a helper that imports
  # detection/internal/mysql for convenience" before they ship.
  #
  # rules/api carries an explicit cross-context exception: it re-exports
  # detection/api types (Event, Process, Finding, NullRawJSON, GraphReader,
  # TimeRange) as type aliases so the catalog rule files can implement
  # rulesapi.Rule.Evaluate without importing detection/api directly. The
  # alias is a deliberate design choice; this rule names it.

  - package: "**.identity.api"
    shouldOnlyDependsOn:
      internal:
        - "**.identity.api.**"
        - "**.attrkeys"
        - "**.httpserver"
        - "**.sqlhelpers"

  - package: "**.endpoint.api"
    shouldOnlyDependsOn:
      internal:
        - "**.endpoint.api.**"
        - "**.attrkeys"
        - "**.httpserver"
        - "**.sqlhelpers"

  - package: "**.rules.api"
    shouldOnlyDependsOn:
      internal:
        - "**.rules.api.**"
        - "**.detection.api"          # alias re-export of detection/api types
        - "**.attrkeys"
        - "**.httpserver"
        - "**.sqlhelpers"

  - package: "**.response.api"
    shouldOnlyDependsOn:
      internal:
        - "**.response.api.**"
        - "**.attrkeys"
        - "**.httpserver"
        - "**.sqlhelpers"

  - package: "**.detection.api"
    shouldOnlyDependsOn:
      internal:
        - "**.detection.api.**"
        - "**.attrkeys"
        - "**.httpserver"
        - "**.sqlhelpers"

  # ----- platform packages: allow-list of acceptable internal deps ------------
  #
  # Plan §"Platform packages": "Platform packages MUST NOT import any context."
  # An earlier revision encoded this as a deny-list (shouldNotDependsOn each
  # bounded context); Gemini's review on PR #100 pointed out that the
  # deny-list is not future-proof: adding a sixth bounded context would
  # require updating every platform rule by hand. The allow-list form
  # (shouldOnlyDependsOn the explicit set of allowed internal-graph deps)
  # auto-excludes any new context: a future server/<new-context>/ package
  # is implicitly forbidden because it isn't named in the allow.
  #
  # The allow-list enumerates: every other platform package, the repo-level
  # internal/ tree (envparse + observability today), and stdlib/third-party
  # imports (which arch-go's "internal:" key doesn't restrict; third-party
  # imports flow through automatically, no listing needed).
  #
  # Patterns use full module paths because `**.bootstrap` would otherwise
  # also match each context's bootstrap, and `**.testdb` would also match
  # testdb/full (the cross-context fixture composer that legitimately
  # imports each testkit).

  - package: "github.com/fleetdm/edr/server/config"
    shouldOnlyDependsOn:
      internal: &platform_allow
        - "github.com/fleetdm/edr/server/config"
        - "github.com/fleetdm/edr/server/bootstrap"
        - "github.com/fleetdm/edr/server/httpserver"
        - "github.com/fleetdm/edr/server/logging"
        - "github.com/fleetdm/edr/server/metrics"
        - "github.com/fleetdm/edr/server/attrkeys"
        - "github.com/fleetdm/edr/server/apidocs"
        - "github.com/fleetdm/edr/server/sqlhelpers"
        - "github.com/fleetdm/edr/server/ui"
        - "**.internal.**"

  - package: "github.com/fleetdm/edr/server/bootstrap"
    shouldOnlyDependsOn:
      internal: *platform_allow

  - package: "github.com/fleetdm/edr/server/httpserver"
    shouldOnlyDependsOn:
      internal: *platform_allow

  - package: "github.com/fleetdm/edr/server/logging"
    shouldOnlyDependsOn:
      internal: *platform_allow

  - package: "github.com/fleetdm/edr/server/metrics"
    shouldOnlyDependsOn:
      internal: *platform_allow

  - package: "github.com/fleetdm/edr/server/attrkeys"
    shouldOnlyDependsOn:
      internal: *platform_allow

  - package: "github.com/fleetdm/edr/server/apidocs"
    shouldOnlyDependsOn:
      internal: *platform_allow

  - package: "github.com/fleetdm/edr/server/sqlhelpers"
    shouldOnlyDependsOn:
      internal: *platform_allow

  # NOTE: server/testdb itself is a Go-leaf and imports no context, but its
  # sub-package server/testdb/full is the cross-context fixture composer and
  # imports each context's testkit. arch-go's package patterns are prefix-
  # matched (github.com/fleetdm/edr/server/testdb matches both leaf + full),
  # so a single rule can't distinguish them. The leaf invariant is verified
  # by inspection (server/testdb/open.go imports nothing in server/<X>/) and
  # by the per-testkit rules below preventing transitive sneak-ins.

  - package: "github.com/fleetdm/edr/server/ui"
    shouldOnlyDependsOn:
      internal: *platform_allow

  # ----- bootstrap/ access: enforced indirectly --------------------------------
  #
  # Plan §"Architecture lint" prescribes "Allow only `cmd/**` and
  # `test/integration/**` to import any `bootstrap/` package."
  # arch-go v1.7.0 exposes only "depends-on" rule families
  # (shouldOnlyDependsOn / shouldNotDependsOn), not the inverse
  # "shouldOnlyBeAccessedBy" the plan sketched against v2. The
  # invariant is enforced indirectly by the importer-perspective
  # rules already in this file:
  #
  #   - Platform packages cannot import any context (incl. bootstraps).
  #   - <X>/api packages cannot import any other context's bootstrap
  #     (the api-purity allow-list excludes it).
  #   - <X>/internal/* packages cannot import another context's
  #     bootstrap (each context's allow-list lists only that context's
  #     own packages + cross-context **.<Y>.api / **.<Y>.testkit).
  #   - <X>/testkit may import its OWN context's bootstrap (per-testkit
  #     rule); other contexts' testkits are not in any internal
  #     allow-list, so cross-context testkit imports go through testkit
  #     too, not bootstrap.
  #
  # The remaining production-reachable bootstrap importers are
  # cmd/fleet-edr-{server,ingest} and each <X>/testkit. New packages
  # outside those slots would have to be added explicitly; code review
  # is the gate. If arch-go ever ships a "shouldOnlyBeAccessedBy" rule
  # family in v2, this section becomes the single declarative
  # source of truth instead of a property derived from many other
  # rules.
