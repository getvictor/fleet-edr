version: 1

# Architecture rules for the modular-monolith bounded-context migration.
# See docs/adr/0004-modular-monolith-bounded-contexts.md for the rationale.
#
# Rules are added one bounded context at a time as each phase lands. Phase 7
# tightens the rule set with cross-cutting `bootstrap/` access restrictions
# and api/ -> internal/ blocking.

dependenciesRules:
  # Phase 1: identity context internals may import only their own context,
  # platform packages, and standard library / approved third-party. Other
  # contexts that need identity functionality go through identity/api.
  #
  # arch-go pattern syntax: dots are wildcards for path segments. The
  # match below covers packages whose path contains /identity/internal/...
  - package: "**.identity.internal.**"
    shouldOnlyDependsOn:
      internal:
        - "**.identity.**"
        - "**.attrkeys"
        - "**.httpserver"
        - "**.store"  # for testhelper only; phase 5 removes the cross-context FK that forces this

  # Phase 2: endpoint context internals may import only their own context,
  # platform packages, and standard library / approved third-party. Other
  # contexts that need enrollment / host-token verification go through
  # endpoint/api.
  #
  # The endpoint context owns the enrollments table and the host-token
  # verifier; admin's policy fan-out reaches it through endpointapi.Service,
  # not by importing internal/mysql or internal/service directly.
  - package: "**.endpoint.internal.**"
    shouldOnlyDependsOn:
      internal:
        - "**.endpoint.**"
        - "**.attrkeys"
        - "**.httpserver"
        - "**.store"  # for store.Event/Command/Host shared types and testhelper
