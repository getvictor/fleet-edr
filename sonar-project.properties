sonar.organization=getvictor
sonar.projectKey=getvictor_fleet-edr
sonar.projectName=fleet-edr

sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/*_test.go,**/*.test.ts,**/*.test.tsx,**/*Tests.swift

sonar.exclusions=**/vendor/**,**/node_modules/**,**/dist/**,ui/coverage/**,server/ui/dist/**,tmp/**,claude/**,extension/edr/build/**,extension/edr/tmp/**,extension/edr/**/DerivedData/**,extension/edr/**/*.xcodeproj/**,**/*.min.js,**/*.min.css

sonar.sourceEncoding=UTF-8

# Coverage uploads. Go reports flow through the native `go test -coverprofile`
# format that SonarCloud's Go analyser reads directly; UI reports are standard
# LCOV emitted by vitest's v8 provider. The test workflow splits Go tests
# into agent + server jobs (different runners, different MySQL needs) so
# each emits its own profile; Sonar merges overlapping coverage per file.
sonar.go.coverage.reportPaths=coverage-agent.out,coverage-server.out
sonar.javascript.lcov.reportPaths=ui/coverage/lcov.info

# Exclude from coverage the files that are intentionally not tested:
#   - cmd/*/main.go entry points: one-time process wiring, naturally 0%.
#   - testharness/**: test-support code that itself has no tests but whose
#     exercising is proven by every rule_test.go that imports it.
#   - schema/**: JSON schema lives outside the Go test surface.
# Keeping these in scope would artificially drag the "new code coverage"
# gate number any time main.go or the harness gets edited.
sonar.coverage.exclusions=**/cmd/**/main.go,server/detection/testharness/**,schema/**

# Skip C/C++/Objective-C analysis (requires a compilation database we don't generate).
# The only C in the repo is small CGo bridge files in agent/.
sonar.c.file.suffixes=-
sonar.cpp.file.suffixes=-
sonar.objc.file.suffixes=-
